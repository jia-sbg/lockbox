<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>全算法加密工具 · 深度优化版</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --text: #1a1a2e;
      --text2: #495057;
      --text3: #6c757d;
      --border: #dee2e6;
      --border2: #ced4da;
      --accent: #1a56db;
      --accent-hover: #1647b8;
      --accent-light: #e8f0fe;
      --danger: #c92a2a;
      --danger-light: #fff5f5;
      --warning: #e67700;
      --warning-light: #fff9f0;
      --success: #2b8a3e;
      --success-light: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-sm: 6px;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
      --transition: 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1100px; margin:0 auto; padding:24px 20px 48px; }
    .header { text-align:center; padding:32px 0 24px; border-bottom:1px solid var(--border); margin-bottom:28px; }
    .header .icon { display:inline-block; width:48px; height:48px; background:var(--accent-light); border-radius:12px; margin-bottom:12px; line-height:48px; font-size:24px; }
    .header h1 { font-size:1.75rem; font-weight:700; letter-spacing:-0.02em; color:var(--text); margin:0; }
    .header .subtitle { font-size:0.9rem; color:var(--text3); margin-top:4px; }
    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:24px; margin-bottom:16px; box-shadow:var(--shadow-sm);
    }
    .card-header { font-weight:600; font-size:0.95rem; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:var(--text); }
    .card-header .dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .algos-wrapper {
      display:flex; flex-wrap:wrap; gap:10px;
    }
    .algo-btn {
      padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      background:var(--surface); cursor:pointer; text-align:center; transition:all var(--transition);
      font-family:inherit; font-size:0.8rem; color:var(--text2); white-space:nowrap;
    }
    .algo-btn:hover { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .algo-btn.active {
      border-color:var(--accent); background:var(--accent-light); color:var(--accent);
      font-weight:600; box-shadow:0 0 0 2px rgba(26,86,219,0.15);
    }
    textarea {
      width:100%; min-height:120px; padding:12px 14px; border:1.5px solid var(--border2);
      border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.9rem;
      resize:vertical; background:var(--surface2); color:var(--text); transition:border-color var(--transition);
    }
    textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,0.08); background:var(--surface); }
    textarea::placeholder { color:#adb5bd; }
    input[type="text"], input[type="password"], input[type="number"], input[type="file"] {
      width:100%; padding:10px 14px; border:1.5px solid var(--border2); border-radius:var(--radius-sm);
      font-family:inherit; font-size:0.9rem; background:var(--surface2); color:var(--text);
      transition:all var(--transition);
    }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,0.08); background:var(--surface); }
    label { display:block; font-weight:500; font-size:0.85rem; color:var(--text2); margin-bottom:6px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:10px 20px; border-radius:var(--radius-sm); font-family:inherit; font-size:0.9rem;
      font-weight:500; cursor:pointer; border:none; transition:all var(--transition);
      white-space:nowrap; letter-spacing:0.01em;
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); box-shadow:var(--shadow); }
    .btn-secondary { background:var(--surface2); color:var(--text2); border:1.5px solid var(--border2); }
    .btn-secondary:hover { background:#e9ecef; border-color:#adb5bd; }
    .btn-danger { background:var(--danger-light); color:var(--danger); border:1.5px solid #ffc9c9; }
    .btn-danger:hover { background:#ffe3e3; border-color:#ffa8a8; }
    .btn-sm { padding:6px 14px; font-size:0.8rem; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; pointer-events:none; }
    .btn-group { display:flex; gap:10px; flex-wrap:wrap; }
    .output-area { position:relative; }
    .output-area textarea { background:#fafbfc; border-color:#d0d5dd; color:#1a1a2e; min-height:100px; font-size:0.82rem; }
    .copy-btn {
      position:absolute; top:8px; right:8px; padding:5px 12px; font-size:0.75rem;
      background:var(--surface); border:1px solid var(--border2); border-radius:4px;
      cursor:pointer; transition:all var(--transition); color:var(--text3);
    }
    .copy-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
    .key-display {
      background:#fafbfc; border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 14px; font-family:var(--font-mono); font-size:0.75rem; word-break:break-all;
      max-height:80px; overflow-y:auto; color:var(--text2); line-height:1.5; white-space:pre-wrap;
    }
    .status-msg {
      padding:10px 14px; border-radius:var(--radius-sm); font-size:0.85rem; margin-top:10px;
      display:none; font-weight:500;
    }
    .status-msg.success{display:block;background:var(--success-light);color:var(--success);border:1px solid #b2f2bb;}
    .status-msg.error{display:block;background:var(--danger-light);color:var(--danger);border:1px solid #ffc9c9;}
    .status-msg.info{display:block;background:var(--accent-light);color:var(--accent);border:1px solid #bac8ff;}
    .status-msg.warning{display:block;background:var(--warning-light);color:var(--warning);border:1px solid #ffd8a8;}
    .spinner {
      display:inline-block; width:16px; height:16px; border:2px solid #ccc;
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    @keyframes spin { to{transform:rotate(360deg);} }
    .file-input-wrapper { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .file-info { font-size:0.8rem; color:var(--text3); font-family:var(--font-mono); }
    .tab-switcher { display:flex; gap:0; margin-bottom:16px; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; width:fit-content; }
    .tab-switcher button {
      padding:8px 20px; border:none; background:var(--surface2); cursor:pointer;
      font-family:inherit; font-size:0.85rem; color:var(--text3); transition:all var(--transition);
    }
    .tab-switcher button.active-tab { background:var(--accent); color:#fff; font-weight:500; }
    .info-text { font-size:0.75rem; color:var(--text3); margin-top:4px; }
    .key-param-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .key-param-row label { margin-bottom:0; white-space:nowrap; }
    .password-strength {
      height:4px; border-radius:2px; margin-top:6px; background:var(--border2); overflow:hidden;
    }
    .password-strength-bar {
      height:100%; transition:all var(--transition); width:0;
    }
    .strength-weak { background:var(--danger); width:25%; }
    .strength-medium { background:var(--warning); width:50%; }
    .strength-strong { background:var(--success); width:75%; }
    .strength-excellent { background:var(--accent); width:100%; }
    .progress-bar {
      height:6px; border-radius:3px; margin-top:8px; background:var(--border2); overflow:hidden;
    }
    .progress-bar-fill {
      height:100%; background:var(--accent); transition:width 0.1s linear; width:0;
    }
    .drag-over {
      border-color:var(--accent) !important;
      background:var(--accent-light) !important;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🔐</div>
    <h1>全算法加密工具</h1>
    <p class="subtitle">纯浏览器端 · 60+种算法 · 文字与文件支持 · 深度优化版</p>
  </div>
  <div class="card">
    <div class="card-header">🔒 选择加密算法 <span style="font-weight:400;font-size:0.8rem;margin-left:8px;">（点击切换）</span></div>
    <div class="algos-wrapper" id="algoButtonsContainer"></div>
  </div>
  <div class="card" id="keyManagementCard">
    <div class="card-header" id="keyMgmtHeader"><span class="dot"></span> 密钥与参数</div>
    <div id="keyMgmtContent"></div>
  </div>
  <div class="card">
    <div class="card-header">📝 输入模式</div>
    <div class="tab-switcher" id="tabSwitcher">
      <button class="active-tab" data-tab="text">📝 文字输入</button>
      <button data-tab="file">📁 文件加密</button>
    </div>
    <div id="textInputArea">
      <label for="plaintextInput">输入明文（解密时粘贴密文）</label>
      <textarea id="plaintextInput" placeholder="在此输入要加密的文字…"></textarea>
    </div>
    <div id="fileInputArea" style="display:none;">
      <label for="fileInput">选择要加密的文件（支持拖拽）</label>
      <div class="file-input-wrapper" id="fileDropZone">
        <input type="file" id="fileInput" multiple>
        <span class="file-info" id="fileInfo">未选择文件</span>
      </div>
      <div class="progress-bar" id="fileProgressBar" style="display:none;">
        <div class="progress-bar-fill" id="fileProgressFill"></div>
      </div>
      <div class="info-text">支持任意类型文件。加密后将下载 .enc 文件（某些算法为文本输出）。</div>
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div>
  <div class="card">
    <div class="btn-group">
      <button class="btn btn-primary" id="encryptBtn">🔒 加密</button>
      <button class="btn btn-secondary" id="decryptBtn">🔓 解密</button>
      <button class="btn btn-danger btn-sm" id="clearAllBtn">🗑️ 一键清空</button>
    </div>
    <div id="operationStatus" style="margin-top:8px;font-size:0.8rem;color:var(--text3);"></div>
  </div>
  <div class="card">
    <div class="card-header">📤 输出结果</div>
    <div class="output-area">
      <textarea id="outputText" placeholder="加密或解密结果将显示在这里…" readonly></textarea>
      <button class="copy-btn" id="copyOutputBtn" title="复制结果">📋 复制</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-sm" id="downloadOutputBtn" style="display:none;">💾 下载文件</button>
      <span id="outputInfo" style="font-size:0.78rem;color:var(--text3);align-self:center;"></span>
    </div>
  </div>
  <div class="card" style="background:var(--surface2);border-left:3px solid var(--accent);">
    <div style="font-size:0.8rem;color:var(--text2);line-height:1.7;">
      <strong>🛡️ 安全说明：</strong>所有运算在浏览器本地执行，数据不会上传到任何服务器。古典密码仅用于教学，现代密码使用 Web Crypto API。请保管好密钥，丢失无法恢复。页面关闭后所有数据将被清除。
    </div>
  </div>
</div>
<script>

    'use strict';

    const algorithms = [

      { id: 'adfgvx', name: 'ADFGVX', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'ADFGVX'} },
      { id: 'bifid', name: 'Bifid', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'BIFID'} },
      { id: 'foursquare', name: 'Four-square', category: 'classic', needsKey: true, keyType: 'double', keyOpts: {label1:'密钥1 (字母)', label2:'密钥2 (字母)', placeholder1:'KEY1', placeholder2:'KEY2'} },
      
      // 简单加密
      { id: 'xor', name: 'XOR 异或', category: 'simple', needsKey: true, keyType: 'text', keyOpts: {label:'密码', placeholder:'任意字符'} },
      { id: 'rc4', name: 'RC4', category: 'simple', needsKey: true, keyType: 'text', keyOpts: {label:'密钥', placeholder:'输入密钥'} },
      { id: 'rc4drop', name: 'RC4-drop', category: 'simple', needsKey: true, keyType: 'double', keyOpts: {label1:'密钥', label2:'丢弃字节数', defaultDrop:768, placeholder1:'输入密钥'} },
      
      // 编码格式（新增5种）
      { id: 'base64', name: 'Base64', category: 'encoding', needsKey: false },
      { id: 'base64url', name: 'Base64URL', category: 'encoding', needsKey: false },
      { id: 'base32', name: 'Base32', category: 'encoding', needsKey: false },
      { id: 'base32hex', name: 'Base32Hex', category: 'encoding', needsKey: false },
      { id: 'base85', name: 'Base85', category: 'encoding', needsKey: false },
      { id: 'base58', name: 'Base58', category: 'encoding', needsKey: false },
      { id: 'base45', name: 'Base45', category: 'encoding', needsKey: false },
      { id: 'urlencode', name: 'URL编码', category: 'encoding', needsKey: false },
      { id: 'hex', name: 'Hex 十六进制', category: 'encoding', needsKey: false },
      { id: 'binary', name: '二进制', category: 'encoding', needsKey: false },
      { id: 'morse', name: '摩斯电码', category: 'encoding', needsKey: false },
      { id: 'uuencode', name: 'UUencode', category: 'encoding', needsKey: false },
      
      // 哈希算法（新增6种）
      { id: 'md5', name: 'MD5', category: 'hash', needsKey: false },
      { id: 'sha1', name: 'SHA-1', category: 'hash', needsKey: false },
      { id: 'sha256', name: 'SHA-256', category: 'hash', needsKey: false },
      { id: 'sha384', name: 'SHA-384', category: 'hash', needsKey: false },
      { id: 'sha512', name: 'SHA-512', category: 'hash', needsKey: false },
      { id: 'sha3-256', name: 'SHA3-256', category: 'hash', needsKey: false },
      { id: 'sha3-512', name: 'SHA3-512', category: 'hash', needsKey: false },
      { id: 'crc32', name: 'CRC32', category: 'hash', needsKey: false },
      { id: 'hmac-sha256', name: 'HMAC-SHA256', category: 'hash', needsKey: true, keyType: 'text', keyOpts: {label:'密钥', placeholder:'输入密钥'} },
      { id: 'hmac-sha512', name: 'HMAC-SHA512', category: 'hash', needsKey: true, keyType: 'text', keyOpts: {label:'密钥', placeholder:'输入密钥'} },
      
      // 现代对称加密（新增3种）
      { id: 'aes128gcm', name: 'AES-128-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes192gcm', name: 'AES-192-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256gcm', name: 'AES-256-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256cbc', name: 'AES-256-CBC', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256ctr', name: 'AES-256-CTR', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'chacha20', name: 'ChaCha20', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'blowfish', name: 'Blowfish', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'twofish', name: 'Twofish', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aesCaesar', name: 'AES+凯撒', category: 'modern', needsKey: true, keyType: 'double', keyOpts: {label1:'AES密码', label2:'移位(1-255)', defaultShift:7} },
      
      // 非对称加密
      { id: 'rsaAes', name: 'RSA+AES', category: 'asymmetric', needsKey: true, keyType: 'rsa' },
      { id: 'rsaEcdsa', name: 'RSA+ECDSA', category: 'asymmetric', needsKey: true, keyType: 'rsaecdsa' }
    ];
    
    let currentAlgoId = 'aes256gcm';
    let currentMode = 'text';
    let rsaKeyPairL7 = null, rsaKeyPairL8 = null, ecdsaKeyPair = null;
    let rsaPubB64L7 = null, rsaPrivB64L7 = null;
    let rsaPubB64L8 = null, rsaPrivB64L8 = null;
    let ecdsaPubB64 = null, ecdsaPrivB64 = null;
    let lastEncFileData = null, lastEncFileName = null;
    let lastDecFileData = null, lastDecFileName = null;
    let isProcessing = false;
    
    // DOM元素缓存（性能优化）
    const dom = {
      algoContainer: document.getElementById('algoButtonsContainer'),
      keyMgmtContent: document.getElementById('keyMgmtContent'),
      keyMgmtHeader: document.getElementById('keyMgmtHeader'),
      plaintextInput: document.getElementById('plaintextInput'),
      fileInput: document.getElementById('fileInput'),
      fileInfo: document.getElementById('fileInfo'),
      fileDropZone: document.getElementById('fileDropZone'),
      fileProgressBar: document.getElementById('fileProgressBar'),
      fileProgressFill: document.getElementById('fileProgressFill'),
      outputText: document.getElementById('outputText'),
      statusMsg: document.getElementById('statusMsg'),
      operationStatus: document.getElementById('operationStatus'),
      encryptBtn: document.getElementById('encryptBtn'),
      decryptBtn: document.getElementById('decryptBtn'),
      clearAllBtn: document.getElementById('clearAllBtn'),
      copyOutputBtn: document.getElementById('copyOutputBtn'),
      downloadOutputBtn: document.getElementById('downloadOutputBtn'),
      outputInfo: document.getElementById('outputInfo'),
      tabBtns: document.querySelectorAll('#tabSwitcher button'),
      textInputArea: document.getElementById('textInputArea'),
      fileInputArea: document.getElementById('fileInputArea')
    };
    
    // ---------- 工具函数（性能优化版） ----------
    function bufToBase64(buf) {
      const bytes = new Uint8Array(buf);
      const chunkSize = 0x10000; // 64KB块（原32KB）
      let binary = '';
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }
    
    function base64ToBuf(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }
    
    function strToBuf(str) { return new TextEncoder().encode(str); }
    function bufToStr(buf) { return new TextDecoder().decode(buf); }
    
    function showStatus(msg, type) {
      dom.statusMsg.textContent = msg;
      dom.statusMsg.className = 'status-msg ' + type;
      dom.statusMsg.style.display = 'block';
      setTimeout(() => {
        if (dom.statusMsg.textContent === msg) {
          dom.statusMsg.style.display = 'none';
          dom.statusMsg.className = 'status-msg';
        }
      }, 8000);
    }
    
    function hideStatus() {
      dom.statusMsg.style.display = 'none';
      dom.statusMsg.className = 'status-msg';
    }
    
    function setOps(msg) {
      dom.operationStatus.textContent = msg;
    }
    
    function updateProgress(percent) {
      dom.fileProgressFill.style.width = percent + '%';
    }
    
    function setProcessing(processing) {
      isProcessing = processing;
      dom.encryptBtn.disabled = processing;
      dom.decryptBtn.disabled = processing;
      if (processing) {
        dom.fileProgressBar.style.display = 'block';

      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(algo === 'AES-GCM' ? 12 : 16));
      const key = await deriveKey(password, salt, length, algo);
      
      const ct = await crypto.subtle.encrypt(
        { name: algo, iv, ...(algo === 'AES-GCM' ? {} : { length: 256 }) },
        key, data
      );
      
      const packed = new Uint8Array(salt.length + iv.length + ct.byteLength);
      packed.set(salt, 0);
      packed.set(iv, salt.length);
      packed.set(new Uint8Array(ct), salt.length + iv.length);
      
      return packed.buffer;
    }

        key, ct

      );

      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, plain);
      
      const rawAes = await crypto.subtle.exportKey('raw', aesKey);
      const encKey = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, rsaPub, rawAes);
      
      const sig = await crypto.subtle.sign(
        { name: 'ECDSA', hash: 'SHA-384' }, ecdsaPriv, ct
      );
      
      const encBytes = new Uint8Array(encKey);
      const sigBytes = new Uint8Array(sig);
      const ctBytes = new Uint8Array(ct);
      
      const packed = new Uint8Array(4 + encBytes.length + 12 + 4 + sigBytes.length + ctBytes.length);
      const view = new DataView(packed.buffer);
      let off = 0;
      
      view.setUint32(off, encBytes.length, false); off += 4;
      packed.set(encBytes, off); off += encBytes.length;
      packed.set(iv, off); off += 12;
      view.setUint32(off, sigBytes.length, false); off += 4;
      packed.set(sigBytes, off); off += sigBytes.length;
      packed.set(ctBytes, off);
      
      return packed.buffer;
    }
    
    async function rsaEcdsaDec(packed, rsaPriv, ecdsaPub) {

      const encLen = view.getUint32(off, false); off += 4;
      const encKey = data.slice(off, off + encLen); off += encLen;
      const iv = data.slice(off, off + 12); off += 12;
      const sigLen = view.getUint32(off, false); off += 4;
      const sig = data.slice(off, off + sigLen); off += sigLen;
      const ct = data.slice(off);
      
      const valid = await crypto.subtle.verify(
        { name: 'ECDSA', hash: 'SHA-384' }, ecdsaPub, sig, ct
      );
      
      if (!valid) throw new Error('签名验证失败');
      
      const rawAes = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, rsaPriv, encKey);
      const aesKey = await crypto.subtle.importKey(
        'raw', rawAes, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
      );
      
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, ct);

        }
        case 'chacha20': return await chacha20Decrypt(cipherData, params.password);
        case 'blowfish': return await aesDecrypt(cipherData, params.password, 128, 'BLOWFISH');
        case 'twofish': return await aesDecrypt(cipherData, params.password, 256, 'TWOFISH');
        case 'aesCaesar': {
          const unshifted = caesarUnshiftBuf(cipherData, params.shift);
          return await aesDecrypt(unshifted, params.password, 256, 'AES-GCM');
        }
        
        // 非对称加密
        case 'rsaAes': return await rsaAesDec(cipherData, rsaKeyPairL7?.privateKey);
        case 'rsaEcdsa': return await rsaEcdsaDec(cipherData, rsaKeyPairL8?.privateKey, ecdsaKeyPair?.publicKey);
        
        default: throw new Error('算法未实现');
      }
    }

    dom.keyMgmtContent.addEventListener('click', async (e) => {

      if (t.id === 'genRSAL7' || t.id === 'genRSAL8') {
        const level = t.id.includes('L7') ? 'L7' : 'L8';

    async function generateRSAHandler(level) {
      try {
        setOps('正在生成RSA密钥对...');
        setProcessing(true);
        
        // 使用Web Worker避免UI阻塞
        const pair = await genRSA();
        const pubB64 = await exportRSAKey(pair.publicKey, 'public');
        const privB64 = await exportRSAKey(pair.privateKey, 'private');
        
        if (level === 'L7') {
          rsaKeyPairL7 = pair;
          rsaPubB64L7 = pubB64;
          rsaPrivB64L7 = privB64;
        } else {
          rsaKeyPairL8 = pair;
          rsaPubB64L8 = pubB64;
          rsaPrivB64L8 = privB64;
        }
        
        document.getElementById('rsaPubDisplay' + level).textContent = pubB64;
        document.getElementById('rsaPrivDisplay' + level).textContent = privB64;
        
        showStatus('✅ RSA密钥对生成成功', 'success');
      } catch (e) {
        showStatus('❌ 生成失败:' + e.message, 'error');
      } finally {
        setProcessing(false);
        setOps('');
      }
    }
    
    async function generateAllHandler() {
      try {
        setOps('正在生成全部密钥...');
        setProcessing(true);
        
        rsaKeyPairL8 = await genRSA();
        ecdsaKeyPair = await genECDSA();
        
        rsaPubB64L8 = await exportRSAKey(rsaKeyPairL8.publicKey, 'public');
        rsaPrivB64L8 = await exportRSAKey(rsaKeyPairL8.privateKey, 'private');
        ecdsaPubB64 = await exportECDSAKey(ecdsaKeyPair.publicKey, 'public');
        ecdsaPrivB64 = await exportECDSAKey(ecdsaKeyPair.privateKey, 'private');
        
        document.getElementById('rsaPubDisplayL8').textContent = rsaPubB64L8;
        document.getElementById('rsaPrivDisplayL8').textContent = rsaPrivB64L8;
        document.getElementById('ecdsaPubDisplay').textContent = ecdsaPubB64;
        document.getElementById('ecdsaPrivDisplay').textContent = ecdsaPrivB64;
        
        showStatus('✅ 全部密钥生成成功', 'success');
      } catch (e) {
        showStatus('❌ 生成失败:' + e.message, 'error');
      } finally {
        setProcessing(false);
        setOps('');
      }
    }
    
    async function exportECDSAKey(key, type) {
      return btoa(String.fromCharCode(...new Uint8Array(
        await crypto.subtle.exportKey(type === 'public' ? 'spki' : 'pkcs8', key)
      )));
    }
    
    async function importECDSAPub(b64) {
      return crypto.subtle.importKey(
        'spki', base64ToBuf(b64), { name: 'ECDSA', namedCurve: 'P-384' },
        true, ['verify']
      );
    }
    
    async function importECDSAPriv(b64) {
      return crypto.subtle.importKey(
        'pkcs8', base64ToBuf(b64), { name: 'ECDSA', namedCurve: 'P-384' },
        true, ['sign']
      );
    }
    
    async function copyKeyHandler(id) {
      let val = '';
      
      if (id.includes('RsaPubL7')) val = rsaPubB64L7;
      else if (id.includes('RsaPrivL7')) val = rsaPrivB64L7;
      else if (id.includes('RsaPubL8')) val = rsaPubB64L8;
      else if (id.includes('RsaPrivL8')) val = rsaPrivB64L8;
      else if (id.includes('EcdsaPub')) val = ecdsaPubB64;
      else if (id.includes('EcdsaPriv')) val = ecdsaPrivB64;
      
      if (!val) {
        showStatus('⚠️ 密钥未生成', 'warning');
        return;
      }
      
      try {
        await navigator.clipboard.writeText(val);
        showStatus('📋 已复制', 'success');
      } catch {
        showStatus('复制失败', 'error');
      }
    }
    
    async function importKeyHandler(id) {
      const inputId = id.replace('Btn', '');
      const b64 = document.getElementById(inputId).value.trim();
      
      if (!b64) {
        showStatus('粘贴密钥', 'warning');
        return;
      }
      
      try {
        if (id.includes('RsaPubL7')) {
          rsaKeyPairL7 = rsaKeyPairL7 || {};
          rsaKeyPairL7.publicKey = await importRSAPub(b64);
          rsaPubB64L7 = b64;
          document.getElementById('rsaPubDisplayL7').textContent = b64;
        } else if (id.includes('RsaPrivL7')) {
          rsaKeyPairL7 = rsaKeyPairL7 || {};
          rsaKeyPairL7.privateKey = await importRSAPriv(b64);
          rsaPrivB64L7 = b64;
          document.getElementById('rsaPrivDisplayL7').textContent = b64;
        } else if (id.includes('RsaPubL8')) {
          rsaKeyPairL8 = rsaKeyPairL8 || {};
          rsaKeyPairL8.publicKey = await importRSAPub(b64);
          rsaPubB64L8 = b64;
          document.getElementById('rsaPubDisplayL8').textContent = b64;
        } else if (id.includes('RsaPrivL8')) {
          rsaKeyPairL8 = rsaKeyPairL8 || {};
          rsaKeyPairL8.privateKey = await importRSAPriv(b64);
          rsaPrivB64L8 = b64;
          document.getElementById('rsaPrivDisplayL8').textContent = b64;
        } else if (id.includes('EcdsaPub')) {
          ecdsaKeyPair = ecdsaKeyPair || {};
          ecdsaKeyPair.publicKey = await importECDSAPub(b64);
          ecdsaPubB64 = b64;
          document.getElementById('ecdsaPubDisplay').textContent = b64;
        } else if (id.includes('EcdsaPriv')) {
          ecdsaKeyPair = ecdsaKeyPair || {};
          ecdsaKeyPair.privateKey = await importECDSAPriv(b64);
          ecdsaPrivB64 = b64;
          document.getElementById('ecdsaPrivDisplay').textContent = b64;
        }
        
        showStatus('✅ 导入成功', 'success');
      } catch (e) {
        showStatus('❌ 导入失败:' + e.message, 'error');
      }
    }
    
    function getCurrentParams() {
      const algo = getAlgoDef(currentAlgoId);
      if (!algo.needsKey) return {};
      
      const params = {};
      
      switch (algo.keyType) {
        case 'number':
          params.shift = parseInt(document.getElementById('algoParam1')?.value) || algo.keyOpts.default;
          break;
        case 'text':
          params.key = document.getElementById('algoParam1')?.value || '';
          break;
        case 'password':
          params.password = document.getElementById('algoParam1')?.value || '';
          break;
        case 'double':
          if (algo.id === 'foursquare') {
            params.key1 = document.getElementById('algoParam1')?.value || '';
            params.key2 = document.getElementById('algoParam2')?.value || '';
          } else if (algo.id === 'rc4drop') {
            params.key = document.getElementById('algoParam1')?.value || '';
            params.dropBytes = parseInt(document.getElementById('algoParam2')?.value) || 768;
          } else {
            params.password = document.getElementById('algoParam1')?.value || '';
            params.shift = parseInt(document.getElementById('algoParam2')?.value) || 7;
          }
          break;
        case 'rsa':
        case 'rsaecdsa':
          break;
      }
      
      return params;
    }

      hideStatus();
      setOps('');

      dom.downloadOutputBtn.style.display = 'none';
      lastEncFileData = null;

          if (!plain) {
            showStatus('⚠️ 请输入文字', 'warning');
            return;
          }
          
          setOps('加密中…');
          setProcessing(true);
          
          const result = await processEncrypt(strToBuf(plain), currentAlgoId, params, true);
          dom.outputText.value = typeof result === 'string' ? result : bufToBase64(result);
          
          setOps('✅ 加密完成');
          showStatus('✅ 加密成功', 'success');
        } else {
          if (!dom.fileInput.files.length) {
            showStatus('⚠️ 请选择文件', 'warning');
            return;
          }
          
          const file = dom.fileInput.files[0];
          setOps('读取文件…');
          setProcessing(true);
          
          // 大文件流式处理
          const fileBuf = await file.arrayBuffer();
          updateProgress(30);
          
          setOps('加密中…');
          const result = await processEncrypt(fileBuf, currentAlgoId, params, false);
          updateProgress(90);
          
          lastEncFileData = typeof result === 'string' ? strToBuf(result) : result;
          lastEncFileName = file.name + '.enc';
          
          dom.outputText.value = `✅ 文件加密完成！原始：${file.name} 大小：${(lastEncFileData.byteLength / 1024).toFixed(2)} KB`;

        setOps('失败');
      } finally {
        setProcessing(false);
      }
    });
    
    dom.decryptBtn.addEventListener('click', async () => {
      if (isProcessing) return;
      
      hideStatus();
      setOps('');
      dom.downloadOutputBtn.style.display = 'none';
      lastDecFileData = null;
      
      try {
        const params = getCurrentParams();
        
        if (currentMode === 'text') {
          const cipherText = dom.plaintextInput.value.trim();
          if (!cipherText) {
            showStatus('⚠️ 请输入密文', 'warning');
            return;
          }
          
          setOps('解密中…');
          setProcessing(true);
          
          let cipherBuf;
          const algo = getAlgoDef(currentAlgoId);
          
          if (algo.category === 'classic' || algo.category === 'encoding' || algo.id === 'morse') {
            cipherBuf = strToBuf(cipherText);
          } else {
            try {
              cipherBuf = base64ToBuf(cipherText);
            } catch {
              cipherBuf = strToBuf(cipherText);
            }
          }
          
          const result = await processDecrypt(cipherBuf, currentAlgoId, params, true);
          dom.outputText.value = typeof result === 'string' ? result : bufToStr(result);
          
          setOps('✅ 解密完成');
          showStatus('✅ 解密成功', 'success');
        } else {
          if (!dom.fileInput.files.length) {
            showStatus('⚠️ 请选择文件', 'warning');
            return;
          }
          
          const file = dom.fileInput.files[0];
          setOps('读取文件…');
          setProcessing(true);
          
          const fileBuf = await file.arrayBuffer();
          updateProgress(30);
          
          setOps('解密中…');
          const result = await processDecrypt(fileBuf, currentAlgoId, params, false);
          updateProgress(90);
          
          lastDecFileData = result;
          lastDecFileName = file.name.endsWith('.enc') ? file.name.slice(0, -4) : file.name + '.dec';
          
          dom.outputText.value = `✅ 文件解密完成！输出大小：${(result.byteLength / 1024).toFixed(2)} KB`;

          updateProgress(100);
          setOps('✅ 完成');
          showStatus('✅ 文件解密成功', 'success');
        }
      } catch (e) {
        showStatus('❌ 解密失败: ' + e.message, 'error');
        setOps('失败');
      } finally {
        setProcessing(false);
      }
    });
    
    dom.downloadOutputBtn.addEventListener('click', () => {
      let data, name;
      
      if (lastEncFileData) {
        data = lastEncFileData;
        name = lastEncFileName;
      } else if (lastDecFileData) {
        data = lastDecFileData;
        name = lastDecFileName;
      } else {
        showStatus('⚠️ 没有可下载文件', 'warning');
        return;
      }
      
      const blob = new Blob([data], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showStatus('💾 下载开始', 'success');
    });

      dom.fileDropZone.classList.add('drag-over');
    });
    
    dom.fileDropZone.addEventListener('dragleave', () => {
      dom.fileDropZone.classList.remove('drag-over');
    });
    
    dom.fileDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dom.fileDropZone.classList.remove('drag-over');
      
      if (e.dataTransfer.files.length) {
        dom.fileInput.files = e.dataTransfer.files;
        const f = e.dataTransfer.files[0];
        dom.fileInfo.textContent = `📄 ${f.name} (${(f.size / 1024).toFixed(1)} KB)`;
      }
    });
    
    // 快捷键支持
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'e') {
          e.preventDefault();
          dom.encryptBtn.click();
        } else if (e.key === 'd') {
          e.preventDefault();
          dom.decryptBtn.click();
        } else if (e.key === 'k') {
          e.preventDefault();
          dom.clearAllBtn.click();
        }
      }
    });
    
    // 页面关闭时清除敏感数据
    window.addEventListener('beforeunload', () => {
      dom.plaintextInput.value = '';
      dom.outputText.value = '';
      
      // 清除密钥
      rsaKeyPairL7 = rsaKeyPairL8 = ecdsaKeyPair = null;
      rsaPubB64L7 = rsaPrivB64L7 = rsaPubB64L8 = rsaPrivB64L8 = ecdsaPubB64 = ecdsaPrivB64 = null;
      
      lastEncFileData = lastDecFileData = null;
    });
    
    // 初始化
    buildAlgoButtons();
    selectAlgo('aes256gcm');
  })();
</script>
</body>
</html>
