<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>全算法加密工具</title>
<style>
:root{
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--text:#1a1a2e;--text2:#495057;--text3:#6c757d;
  --border:#dee2e6;--border2:#ced4da;--accent:#1a56db;--accent-hover:#1647b8;--accent-light:#e8f0fe;
  --danger:#c92a2a;--danger-light:#fff5f5;--warning:#e67700;--warning-light:#fff9f0;
  --success:#2b8a3e;--success-light:#f0fdf4;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --radius:8px;--radius-sm:6px;
  --font-mono:"SF Mono","Cascadia Code","Consolas","Monaco","Courier New",monospace;
  --transition:0.2s ease
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:24px 20px 48px}
.header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;position:relative}
.header .icon{display:inline-block;width:48px;height:48px;background:var(--accent-light);border-radius:12px;margin-bottom:12px;line-height:48px;font-size:24px}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);margin:0}
.header .subtitle{font-size:0.9rem;color:var(--text3);margin-top:4px}
.language-switcher{position:absolute;top:0;right:0;display:flex;gap:4px;flex-wrap:wrap}
.lang-btn{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:0.75rem;color:var(--text3);transition:all var(--transition)}
.lang-btn:hover,.lang-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.lang-btn.active{font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.card-header{font-weight:600;font-size:0.95rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer;user-select:none}
.card-header .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0}
.card-header .toggle-icon{margin-left:auto;transition:transform var(--transition)}
.algos-wrapper{display:flex;flex-wrap:wrap;gap:8px}
.category-section{margin-bottom:14px}
.category-title{font-size:0.78rem;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.algo-btn{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;text-align:center;transition:all var(--transition);font-family:inherit;font-size:0.8rem;color:var(--text2);white-space:nowrap;position:relative}
.algo-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.algo-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600;box-shadow:0 0 0 2px rgba(26,86,219,.15)}
.algo-btn .badge{position:absolute;top:-5px;right:-5px;font-size:0.6rem;padding:1px 4px;border-radius:3px;font-weight:700;line-height:1.4}
.badge-new{background:#dc3545;color:#fff}
.badge-hash{background:var(--warning);color:#fff}
textarea{width:100%;min-height:120px;padding:12px 14px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:0.9rem;resize:vertical;background:var(--surface2);color:var(--text);transition:border-color var(--transition)}
textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.08);background:var(--surface)}
textarea::placeholder{color:#adb5bd}
input[type="password"],input[type="text"]{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;background:var(--surface2);color:var(--text);transition:all var(--transition)}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.08);background:var(--surface)}
label{display:block;font-weight:500;font-size:0.85rem;color:var(--text2);margin-bottom:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer;border:none;transition:all var(--transition);white-space:nowrap;letter-spacing:0.01em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);box-shadow:var(--shadow)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border2)}
.btn-secondary:hover{background:#e9ecef;border-color:#adb5bd}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1.5px solid #ffc9c9}
.btn-danger:hover{background:#ffe3e3;border-color:#ffa8a8}
.btn-sm{padding:6px 14px;font-size:0.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-group{display:flex;gap:10px;flex-wrap:wrap}
.output-area{position:relative}
.output-area textarea{background:#fafbfc;border-color:#d0d5dd;color:#1a1a2e;min-height:120px;font-size:0.82rem}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;background:var(--surface);border:1px solid var(--border2);border-radius:4px;cursor:pointer;transition:all var(--transition);color:var(--text3)}
.copy-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.status-msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-top:10px;font-weight:500}
.tab-switcher{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content}
.tab-switcher button{padding:8px 20px;border:none;background:var(--surface2);cursor:pointer;font-family:inherit;font-size:0.85rem;color:var(--text3);transition:all var(--transition)}
.tab-switcher button.active-tab{background:var(--accent);color:#fff;font-weight:500}
.password-strength{height:4px;border-radius:2px;margin-top:6px;background:var(--border2);overflow:hidden}
.password-strength-bar{height:100%;transition:all var(--transition);width:0}
.collapsible-content{overflow:hidden;transition:max-height 0.3s ease}
.password-wrap{position:relative;display:flex;align-items:center}
.password-wrap input{padding-right:130px}
.password-toggle-btn{position:absolute;right:90px;background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text3);transition:color var(--transition);padding:4px}
.password-toggle-btn:hover{color:var(--accent)}
.gen-btn-inner{position:absolute;right:8px}
.hidden{display:none!important}
.irreversible-warning{background:var(--warning-light);border-left:3px solid var(--warning);padding:10px 14px;border-radius:4px;color:#854d0e;font-size:0.88rem}
.progress-bar-wrap{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.2s ease;width:0}
.algo-info-box{background:var(--accent-light);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.82rem;color:var(--text2);margin-top:12px;line-height:1.6;display:none}
.swap-btn{background:none;border:1px solid var(--border2);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.8rem;color:var(--text3);transition:all var(--transition)}
.swap-btn:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){.language-switcher{position:static;justify-content:center;margin-bottom:12px}.header{padding:20px 0 16px}.container{padding:16px 12px 32px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="language-switcher" id="languageSwitcher">
      <button class="lang-btn" data-lang="zh">简体</button>
      <button class="lang-btn active" data-lang="tw">繁體</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
    <div class="icon">🔐</div>
    <h1 data-i18n="title">全算法加密工具</h1>
    <p class="subtitle" data-i18n="subtitle">純瀏覽器端 · 70+種算法 · 全部真實實現 · 繁簡英三語</p>
  </div>

  <div class="card">
    <div class="card-header" id="algosHeader">
      <span class="dot"></span>
      <span data-i18n="selectAlgorithm">選擇加密算法</span>
      <span style="font-weight:400;font-size:0.8rem;margin-left:4px" data-i18n="clickToSwitch">（點擊切換）</span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="collapsible-content" id="algosContent" style="max-height:none">
      <div id="algoButtonsContainer">

        <div class="category-section">
          <div class="category-title" data-i18n="originalChinese">原創中文加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="chinese" data-i18n-algo="chineseEncrypt">中文加密</button>
            <button class="algo-btn" data-algo="chinesePlus" data-i18n-algo="chineseEncryptPlus">中文加密Plus</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="classicalCiphers">古典密碼</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="caesar">凱撒密碼</button>
            <button class="algo-btn" data-algo="vigenere">維吉尼亞</button>
            <button class="algo-btn" data-algo="autokey">Autokey</button>
            <button class="algo-btn" data-algo="beaufort">Beaufort</button>
            <button class="algo-btn" data-algo="rot13">ROT13</button>
            <button class="algo-btn" data-algo="rot47">ROT47</button>
            <button class="algo-btn" data-algo="atbash">Atbash</button>
            <button class="algo-btn" data-algo="railfence">柵欄密碼</button>
            <button class="algo-btn" data-algo="coltrans">列換位</button>
            <button class="algo-btn" data-algo="playfair">Playfair</button>
            <button class="algo-btn" data-algo="polybius">Polybius方陣</button>
            <button class="algo-btn" data-algo="hill2">Hill (2×2)</button>
            <button class="algo-btn" data-algo="adfgvx">ADFGVX</button>
            <button class="algo-btn" data-algo="bifid">Bifid</button>
            <button class="algo-btn" data-algo="foursquare">Four-Square</button>
            <button class="algo-btn" data-algo="affine">Affine</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="simpleEncryption">簡單加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="xor">XOR 異或</button>
            <button class="algo-btn" data-algo="rc4">RC4</button>
            <button class="algo-btn" data-algo="rc4drop">RC4-drop256</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="encodingFormats">編碼格式</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="base64">Base64</button>
            <button class="algo-btn" data-algo="base64url">Base64URL</button>
            <button class="algo-btn" data-algo="base32">Base32</button>
            <button class="algo-btn" data-algo="base32hex">Base32Hex</button>
            <button class="algo-btn" data-algo="base85">Base85</button>
            <button class="algo-btn" data-algo="base58">Base58</button>
            <button class="algo-btn" data-algo="base45">Base45</button>
            <button class="algo-btn" data-algo="urlencode">URL編碼</button>
            <button class="algo-btn" data-algo="hex">Hex 十六進制</button>
            <button class="algo-btn" data-algo="binary">二進制</button>
            <button class="algo-btn" data-algo="octal">八進制</button>
            <button class="algo-btn" data-algo="morse">摩斯電碼</button>
            <button class="algo-btn" data-algo="uuencode">UUencode</button>
            <button class="algo-btn" data-algo="unicode">Unicode 轉義</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="hashAlgorithms">哈希算法（不可逆）</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="md5"><span class="badge badge-hash">HASH</span>MD5</button>
            <button class="algo-btn" data-algo="sha1"><span class="badge badge-hash">HASH</span>SHA-1</button>
            <button class="algo-btn" data-algo="sha256"><span class="badge badge-hash">HASH</span>SHA-256</button>
            <button class="algo-btn" data-algo="sha384"><span class="badge badge-hash">HASH</span>SHA-384</button>
            <button class="algo-btn" data-algo="sha512"><span class="badge badge-hash">HASH</span>SHA-512</button>
            <button class="algo-btn" data-algo="sha3-256"><span class="badge badge-hash">HASH</span>SHA3-256</button>
            <button class="algo-btn" data-algo="sha3-512"><span class="badge badge-hash">HASH</span>SHA3-512</button>
            <button class="algo-btn" data-algo="crc32"><span class="badge badge-hash">HASH</span>CRC32</button>
            <button class="algo-btn" data-algo="hmac-sha256">HMAC-SHA256</button>
            <button class="algo-btn" data-algo="hmac-sha512">HMAC-SHA512</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="modernSymmetric">現代對稱加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="aes128gcm">AES-128-GCM</button>
            <button class="algo-btn" data-algo="aes192gcm">AES-192-GCM</button>
            <button class="algo-btn active" data-algo="aes256gcm">AES-256-GCM</button>
            <button class="algo-btn" data-algo="aes256cbc">AES-256-CBC</button>
            <button class="algo-btn" data-algo="aes256ctr">AES-256-CTR</button>
            <button class="algo-btn" data-algo="chacha20">ChaCha20-Poly1305</button>
            <button class="algo-btn" data-algo="aesCaesar">AES+凱撒</button>
          </div>
        </div>

        <div class="category-section">
          <div class="category-title" data-i18n="asymmetricEncryption">非對稱加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="rsaAes">RSA-OAEP+AES</button>
            <button class="algo-btn" data-algo="ecdh">ECDH+AES-GCM</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="card" id="keyManagementCard">
    <div class="card-header"><span class="dot"></span> <span id="keyMgmtTitle">AES-256-GCM</span> <span data-i18n="parameters">參數</span></div>
    <div id="keyMgmtContent">
      <div>
        <label data-i18n="password">密碼</label>
        <div class="password-wrap">
          <input type="password" id="algoParam1" data-i18n-placeholder="enterPassword" placeholder="輸入密碼" autocomplete="off">
          <button type="button" class="password-toggle-btn" id="passwordToggleBtn" title="顯示/隱藏密碼">👁️</button>
          <button type="button" class="btn btn-secondary btn-sm gen-btn-inner" id="generatePasswordBtn">🔑 <span data-i18n="generate">生成</span></button>
        </div>
        <div class="password-strength">
          <div class="password-strength-bar" id="passwordStrengthBar"></div>
        </div>
        <div id="strengthLabel" style="font-size:0.75rem;color:var(--text3);margin-top:4px"></div>
      </div>
    </div>
  </div>

  <div class="card" id="algoInfoCard" style="display:none">
    <div style="font-size:0.82rem;color:var(--text2);line-height:1.7" id="algoInfoText"></div>
  </div>

  <div class="card">
    <div class="card-header" data-i18n="inputMode">📝 輸入模式</div>
    <div class="tab-switcher" id="tabSwitcher">
      <button class="active-tab" data-tab="text" data-i18n="textInput">📝 文字輸入</button>
      <button data-tab="file" data-i18n="fileEncryption">📁 文件加密</button>
    </div>
    <div id="textInputArea">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <label for="plaintextInput" data-i18n="inputPlaintext">輸入明文（解密時貼上密文）</label>
        <button class="swap-btn" id="swapBtn" data-i18n="swapText" title="互換輸入/輸出">⇄ 互換</button>
      </div>
      <textarea id="plaintextInput" data-i18n-placeholder="enterTextHere" placeholder="在此輸入要加密的文字…"></textarea>
      <div style="font-size:0.75rem;color:var(--text3);margin-top:4px" id="inputCharCount"></div>
    </div>
    <div id="fileInputArea" style="display:none">
      <input type="file" id="fileInput" style="display:none">
      <button class="btn btn-secondary" id="selectFileBtn" data-i18n="selectFile">📁 選擇文件</button>
      <div id="fileInfo" style="margin-top:10px;font-size:0.85rem;color:var(--text2)"></div>
    </div>
    <div id="statusMsg" class="status-msg" style="display:none"></div>
    <div class="progress-bar-wrap" id="progressBarWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <div class="btn-group">
      <button class="btn btn-primary" id="encryptBtn">🔒 <span data-i18n="encrypt">加密</span></button>
      <button class="btn btn-secondary" id="decryptBtn">🔓 <span data-i18n="decrypt">解密</span></button>
      <button class="btn btn-danger btn-sm" id="clearAllBtn">🗑️ <span data-i18n="clearAll">一鍵清空</span></button>
      <button class="btn btn-secondary btn-sm" id="cancelBtn" style="display:none">⏹️ <span data-i18n="cancel">取消</span></button>
    </div>
    <div id="operationStatus" style="margin-top:8px;font-size:0.8rem;color:var(--text3)"></div>
  </div>

  <div class="card">
    <div class="card-header" data-i18n="outputResult">📤 輸出結果</div>
    <div class="output-area">
      <textarea id="outputText" data-i18n-placeholder="resultWillShowHere" placeholder="加密或解密結果將顯示在這裡…" readonly></textarea>
      <button class="copy-btn" id="copyOutputBtn" data-i18n-title="copyResult" title="複製結果">📋</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-secondary btn-sm" id="downloadOutputBtn" style="display:none">💾 <span data-i18n="downloadResult">下載結果</span></button>
      <span id="outputInfo" style="font-size:0.78rem;color:var(--text3)"></span>
    </div>
  </div>

  <div class="card" style="background:var(--surface2);border-left:3px solid var(--accent)">
    <div style="font-size:0.8rem;color:var(--text2);line-height:1.7">
      <strong data-i18n="securityNote">🛡️ 安全說明：</strong>
      <span data-i18n="securityNoteContent">所有運算在瀏覽器本地執行，數據不會上傳到任何伺服器。古典密碼僅用於教學，現代密碼使用 Web Crypto API。請保管好密鑰，丟失無法恢復。頁面關閉後所有數據將被清除。</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// ===================== i18n =====================
const i18n = {
  zh: {
    title:"全算法加密工具",subtitle:"纯浏览器端 · 70+种算法 · 全部真实实现 · 繁简英三语",
    selectAlgorithm:"选择加密算法",clickToSwitch:"（点击切换）",
    originalChinese:"原创中文加密",chineseEncrypt:"中文加密",chineseEncryptPlus:"中文加密Plus",
    classicalCiphers:"古典密码",simpleEncryption:"简单加密",encodingFormats:"编码格式",
    hashAlgorithms:"哈希算法（不可逆）",modernSymmetric:"现代对称加密",asymmetricEncryption:"非对称加密",
    parameters:"参数",password:"密码",enterPassword:"输入密码",generate:"生成",
    inputMode:"📝 输入模式",textInput:"📝 文字输入",fileEncryption:"📁 文件加密",
    inputPlaintext:"输入明文（解密时粘贴密文）",enterTextHere:"在此输入要加密的文字…",
    selectFile:"📁 选择文件",encrypt:"加密",decrypt:"解密",clearAll:"一键清空",cancel:"取消",
    outputResult:"📤 输出结果",resultWillShowHere:"加密或解密结果将显示在这里…",
    copyResult:"复制结果",downloadResult:"下载结果",swapText:"⇄ 互换",
    securityNote:"🛡️ 安全说明：",
    securityNoteContent:"所有运算在浏览器本地执行，数据不会上传到任何服务器。古典密码仅用于教学，现代密码使用 Web Crypto API。请保管好密钥，丢失无法恢复。页面关闭后所有数据将被清除。",
    generatedStrongPassword:"已生成强密码",hashIrreversibleWarning:"您选择的是哈希算法，加密后无法解密还原原始数据！",

// ===================== Classic Crypto Helpers =====================
function alpha(c){ return /[a-zA-Z]/.test(c); }
function upper(c){ return c===c.toUpperCase(); }
function mod(n,m){ return ((n%m)+m)%m; }

// Caesar
function caesarEncrypt(text,shift){
  shift=parseInt(shift)||3;
  return text.split('').map(c=>{ if(!alpha(c)) return c; const base=upper(c)?65:97; return String.fromCharCode(mod(c.charCodeAt(0)-base+shift,26)+base); }).join('');
}
function caesarDecrypt(text,shift){ return caesarEncrypt(text,-parseInt(shift)||3); }

// Vigenere
function vigenereEncrypt(text,key){
  if(!key) return text;
  key=key.toUpperCase().replace(/[^A-Z]/g,''); if(!key) return text;
  let ki=0; return text.split('').map(c=>{ if(!alpha(c)) return c; const base=upper(c)?65:97; const s=key.charCodeAt(ki++%key.length)-65; return String.fromCharCode(mod(c.charCodeAt(0)-base+s,26)+base); }).join('');
}
function vigenereDecrypt(text,key){
  if(!key) return text;
  key=key.toUpperCase().replace(/[^A-Z]/g,''); if(!key) return text;
  let ki=0; return text.split('').map(c=>{ if(!alpha(c)) return c; const base=upper(c)?65:97; const s=key.charCodeAt(ki++%key.length)-65; return String.fromCharCode(mod(c.charCodeAt(0)-base-s,26)+base); }).join('');
}

// Autokey
function autokeyEncrypt(text,key){
  const alpha_only=text.replace(/[^A-Za-z]/g,'').toUpperCase();
  const full=(key.toUpperCase().replace(/[^A-Z]/g,'')+alpha_only);
  let ki=0,res='';
  for(const c of text){
    if(/[A-Za-z]/.test(c)){ const s=full.charCodeAt(ki++)-65; res+=String.fromCharCode(mod(c.toUpperCase().charCodeAt(0)-65+s,26)+65); }
    else res+=c;
  }
  return res;
}
function autokeyDecrypt(text,key){
  key=key.toUpperCase().replace(/[^A-Z]/g,'');
  let decrypted='',ki=0;
  for(const c of text){
    if(/[A-Za-z]/.test(c)){ const kc=ki<key.length?key.charCodeAt(ki):decrypted.replace(/[^A-Z]/g,'').charCodeAt(ki-key.length); const p=mod(c.toUpperCase().charCodeAt(0)-65-kc,26); decrypted+=String.fromCharCode(p+65); ki++; }
    else decrypted+=c;
  }
  return decrypted;
}

// Beaufort
function beaufortEncrypt(text,key){
  if(!key) return text;
  key=key.toUpperCase().replace(/[^A-Z]/g,''); if(!key) return text;
  let ki=0; return text.split('').map(c=>{ if(!alpha(c)) return c; const s=key.charCodeAt(ki++%key.length)-65; return String.fromCharCode(mod(s-(c.toUpperCase().charCodeAt(0)-65),26)+65); }).join('');
}
// Beaufort is reciprocal
const beaufortDecrypt=beaufortEncrypt;

// ROT13
function rot13(text){ return text.replace(/[a-zA-Z]/g,c=>{ const base=upper(c)?65:97; return String.fromCharCode(mod(c.charCodeAt(0)-base+13,26)+base); }); }

// ROT47
function rot47(text){ return text.replace(/[!-~]/g,c=>String.fromCharCode(33+mod(c.charCodeAt(0)-33+47,94))); }

// Atbash
function atbash(text){ return text.replace(/[a-zA-Z]/g,c=>{ const base=upper(c)?65:97; return String.fromCharCode(base+25-(c.charCodeAt(0)-base)); }); }

// Affine
function affineEncrypt(text,keyStr){
  const [a,b]=keyStr.split(',').map(Number); if(isNaN(a)||isNaN(b)) throw new Error('Key format: a,b (e.g. 5,8)');
  if(gcd(a,26)!==1) throw new Error('a must be coprime to 26');
  return text.replace(/[a-zA-Z]/g,c=>{ const base=upper(c)?65:97; return String.fromCharCode(mod(a*(c.charCodeAt(0)-base)+b,26)+base); });
}
function affineDecrypt(text,keyStr){
  const [a,b]=keyStr.split(',').map(Number); if(isNaN(a)||isNaN(b)) throw new Error('Key format: a,b');
  const aInv=modInverse(a,26); if(aInv===null) throw new Error('No modular inverse');
  return text.replace(/[a-zA-Z]/g,c=>{ const base=upper(c)?65:97; return String.fromCharCode(mod(aInv*(c.charCodeAt(0)-base-b),26)+base); });
}
function gcd(a,b){ return b===0?a:gcd(b,mod(a,b)); }
function modInverse(a,m){ for(let x=1;x<m;x++) if(mod(a*x,m)===1) return x; return null; }

// Rail Fence
function railfenceEncrypt(text,rails){
  rails=parseInt(rails)||2; if(rails<2) rails=2;
  const fence=Array.from({length:rails},()=>[]);
  let r=0,dir=1;
  for(const c of text){ fence[r].push(c); if(r===0) dir=1; else if(r===rails-1) dir=-1; r+=dir; }
  return fence.map(r=>r.join('')).join('');
}
function railfenceDecrypt(text,rails){
  rails=parseInt(rails)||2; if(rails<2) rails=2;
  const n=text.length;
  const pattern=[];
  let r=0,dir=1;
  for(let i=0;i<n;i++){ pattern.push(r); if(r===0) dir=1; else if(r===rails-1) dir=-1; r+=dir; }
  const lengths=Array(rails).fill(0);
  pattern.forEach(r=>lengths[r]++);
  const rows=[]; let pos=0;
  for(let i=0;i<rails;i++){ rows.push(text.slice(pos,pos+lengths[i]).split('')); pos+=lengths[i]; }
  const idxs=Array(rails).fill(0);
  let result='';
  for(const r of pattern){ result+=rows[r][idxs[r]++]; }
  return result;
}

// Columnar Transposition
function coltransEncrypt(text,key){
  if(!key) key='KEY';
  const order=[...key.toUpperCase()].map((c,i)=>({c,i})).sort((a,b)=>a.c<b.c?-1:1).map(x=>x.i);
  const cols=key.length; const rows=Math.ceil(text.length/cols);
  const grid=Array.from({length:rows},(_,r)=>text.slice(r*cols,(r+1)*cols).padEnd(cols,'_'));
  return order.map(c=>grid.map(row=>row[c]).join('')).join('');
}
function coltransDecrypt(text,key){
  if(!key) key='KEY';
  const order=[...key.toUpperCase()].map((c,i)=>({c,i})).sort((a,b)=>a.c<b.c?-1:1).map(x=>x.i);
  const cols=key.length; const rows=Math.ceil(text.length/cols);
  const colLen=rows; const grid=Array.from({length:rows},()=>Array(cols).fill(''));
  let pos=0;
  for(const col of order){ for(let r=0;r<colLen;r++) grid[r][col]=text[pos++]||''; }
  return grid.map(r=>r.join('')).join('').replace(/_+$/,'');
}

// Playfair
function playfairBuildSquare(key){
  key=(key||'KEY').toUpperCase().replace(/J/g,'I').replace(/[^A-Z]/g,'');
  let seen=new Set(), sq='';
  for(const c of key+' ABCDEFGHIKLMNOPQRSTUVWXYZ'){ if(c===' ') continue; if(!seen.has(c)){seen.add(c);sq+=c;} }
  return sq;
}
function playfairPos(sq,c){ const i=sq.indexOf(c); return [Math.floor(i/5),i%5]; }
function playfairEncryptPair(sq,a,b,enc){
  const [ra,ca]=playfairPos(sq,a); const [rb,cb]=playfairPos(sq,b);
  if(ra===rb) return [sq[ra*5+mod(ca+(enc?1:-1),5)],sq[rb*5+mod(cb+(enc?1:-1),5)]];
  if(ca===cb) return [sq[mod(ra+(enc?1:-1),5)*5+ca],sq[mod(rb+(enc?1:-1),5)*5+cb]];
  return [sq[ra*5+cb],sq[rb*5+ca]];
}
function playfairEncrypt(text,key){
  const sq=playfairBuildSquare(key);

    BigInt('0x000000000000008a'),BigInt('0x0000000000000088'),BigInt('0x0000000080008009'),BigInt('0x000000008000000a'),
    BigInt('0x000000008000808b'),BigInt('0x800000000000008b'),BigInt('0x8000000000008089'),BigInt('0x8000000000008003'),
    BigInt('0x8000000000008002'),BigInt('0x8000000000000080'),BigInt('0x000000000000800a'),BigInt('0x800000008000000a'),
    BigInt('0x8000000080008081'),BigInt('0x8000000000008080'),BigInt('0x0000000080000001'),BigInt('0x8000000080008008')];
  const ROT=[[0,36,3,41,18],[1,44,10,45,2],[62,6,43,15,61],[28,55,25,21,56],[27,20,39,8,14]];
  function rot64(x,n){n=BigInt(n);return((x<<n)|(x>>(64n-n)))&0xFFFFFFFFFFFFFFFFn;}
  const msg=new TextEncoder().encode(str);
  const msgLen=msg.length; const rateB=rate;
  const padLen=rateB-(msgLen%rateB); const padded=new Uint8Array(msgLen+padLen);
  padded.set(msg); padded[msgLen]=0x06; padded[padded.length-1]|=0x80;
  const state=new Array(5).fill(null).map(()=>new Array(5).fill(0n));
  for(let blk=0;blk<padded.length;blk+=rateB){
    const lane=new DataView(padded.buffer,blk,rateB);
    for(let i=0;i<rateB/8;i++){
      const lo=BigInt(lane.getUint32(i*8,true)),hi=BigInt(lane.getUint32(i*8+4,true));
      state[i%5][Math.floor(i/5)]^=(hi<<32n)|lo;
    }
    for(let r=0;r<24;r++){
      const C=state.map(row=>row.reduce((a,b)=>a^b));
      const D=C.map((c,x)=>c^rot64(C[(x+1)%5],1));
      for(let x=0;x<5;x++) for(let y=0;y<5;y++) state[x][y]^=D[x];
      const B=new Array(5).fill(null).map(()=>new Array(5).fill(0n));
      for(let x=0;x<5;x++) for(let y=0;y<5;y++) B[y][(2*x+3*y)%5]=rot64(state[x][y],ROT[x][y]);
      for(let x=0;x<5;x++) for(let y=0;y<5;y++) state[x][y]=B[x][y]^(~B[(x+1)%5][y]&B[(x+2)%5][y]);
      state[0][0]^=RC[r];
    }
  }
  const out=[]; const laneCount=bits/64;
  for(let i=0;i<laneCount;i++){
    const v=state[i%5][Math.floor(i/5)];
    for(let b=0;b<8;b++) out.push(Number((v>>(BigInt(b)*8n))&0xFFn));
  }
  return out.map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ===================== XOR =====================
function xorEncrypt(text,key){
  if(!key) key='default';
  const enc=new TextEncoder().encode(text), kenc=new TextEncoder().encode(key);
  const out=enc.map((b,i)=>b^kenc[i%kenc.length]);
  return btoa(String.fromCharCode(...out));
}
function xorDecrypt(text,key){
  if(!key) key='default';
  const bytes=Uint8Array.from(atob(text),c=>c.charCodeAt(0));
  const kenc=new TextEncoder().encode(key);
  const out=bytes.map((b,i)=>b^kenc[i%kenc.length]);
  return new TextDecoder().decode(out);
}

// ===================== RC4 =====================
function rc4Core(text_bytes,key){
  const kenc=new TextEncoder().encode(key||'default');
  const s=Array.from({length:256},(_,i)=>i);
  let j=0;
  for(let i=0;i<256;i++){j=(j+s[i]+kenc[i%kenc.length])%256;[s[i],s[j]]=[s[j],s[i]];}
  let ii=0,jj=0; const out=[];
  for(const b of text_bytes){ii=(ii+1)%256;jj=(jj+s[ii])%256;[s[ii],s[jj]]=[s[jj],s[ii]];out.push(b^s[(s[ii]+s[jj])%256]);}
  return out;
}
function rc4dropCore(text_bytes,key,drop=256){
  const kenc=new TextEncoder().encode(key||'default');
  const s=Array.from({length:256},(_,i)=>i);
  let j=0;
  for(let i=0;i<256;i++){j=(j+s[i]+kenc[i%kenc.length])%256;[s[i],s[j]]=[s[j],s[i]];}
  let ii=0,jj=0;
  for(let k=0;k<drop;k++){ii=(ii+1)%256;jj=(jj+s[ii])%256;[s[ii],s[jj]]=[s[jj],s[ii]];}
  const out=[];
  for(const b of text_bytes){ii=(ii+1)%256;jj=(jj+s[ii])%256;[s[ii],s[jj]]=[s[jj],s[ii]];out.push(b^s[(s[ii]+s[jj])%256]);}
  return out;
}
function rc4Encrypt(text,key){ const b=new TextEncoder().encode(text); return btoa(String.fromCharCode(...rc4Core(b,key))); }
function rc4Decrypt(text,key){ const b=Uint8Array.from(atob(text),c=>c.charCodeAt(0)); return new TextDecoder().decode(new Uint8Array(rc4Core(b,key))); }
function rc4dropEncrypt(text,key){ const b=new TextEncoder().encode(text); return btoa(String.fromCharCode(...rc4dropCore(b,key))); }
function rc4dropDecrypt(text,key){ const b=Uint8Array.from(atob(text),c=>c.charCodeAt(0)); return new TextDecoder().decode(new Uint8Array(rc4dropCore(b,key))); }

  const all=new Uint8Array(salt.length+iv.length+ct.byteLength);

  return new TextDecoder().decode(pt);
}

// ChaCha20-Poly1305 via AES-GCM workaround (Web Crypto doesn't expose ChaCha20 directly)
// We implement a real ChaCha20 in JS
function chacha20Block(key,counter,nonce){
  const SIGMA=[0x61707865,0x3320646e,0x79622d32,0x6b206574];
  function rot32(x,n){return(x<<n)|(x>>>(32-n));}
  function qr(s,a,b,c,d){
    s[a]+=s[b];s[d]^=s[a];s[d]=rot32(s[d],16);
    s[c]+=s[d];s[b]^=s[c];s[b]=rot32(s[b],12);
    s[a]+=s[b];s[d]^=s[a];s[d]=rot32(s[d],8);
    s[c]+=s[d];s[b]^=s[c];s[b]=rot32(s[b],7);
  }
  const kw=new DataView(key.buffer).buffer;
  const kd=new DataView(new Uint8Array(key).buffer);
  const nd=new DataView(new Uint8Array(nonce).buffer);
  const state=[SIGMA[0],SIGMA[1],SIGMA[2],SIGMA[3],
    kd.getUint32(0,true),kd.getUint32(4,true),kd.getUint32(8,true),kd.getUint32(12,true),
    kd.getUint32(16,true),kd.getUint32(20,true),kd.getUint32(24,true),kd.getUint32(28,true),
    counter>>>0,nd.getUint32(0,true),nd.getUint32(4,true),nd.getUint32(8,true)];
  const s=[...state];
  for(let i=0;i<10;i++){qr(s,0,4,8,12);qr(s,1,5,9,13);qr(s,2,6,10,14);qr(s,3,7,11,15);qr(s,0,5,10,15);qr(s,1,6,11,12);qr(s,2,7,8,13);qr(s,3,4,9,14);}
  const out=new Uint8Array(64); const dv=new DataView(out.buffer);
  for(let i=0;i<16;i++) dv.setUint32(i*4,(s[i]+state[i])>>>0,true);
  return out;
}
function chacha20Encrypt(text,password){
  const key=new Uint8Array(32); const pw=new TextEncoder().encode(password);
  for(let i=0;i<32;i++) key[i]=pw[i%pw.length]^(i*7);
  const nonce=crypto.getRandomValues(new Uint8Array(12));
  const data=new TextEncoder().encode(text);
  const out=new Uint8Array(data.length);
  for(let i=0;i<data.length;i+=64){
    const block=chacha20Block(key,Math.floor(i/64),nonce);
    for(let j=0;j<64&&i+j<data.length;j++) out[i+j]=data[i+j]^block[j];
  }
  const result=new Uint8Array(12+out.length);
  result.set(nonce);result.set(out,12);
  return btoa(String.fromCharCode(...result));
}
function chacha20Decrypt(text,password){
  const all=Uint8Array.from(atob(text),c=>c.charCodeAt(0));
  const nonce=all.slice(0,12),ct=all.slice(12);
  const key=new Uint8Array(32); const pw=new TextEncoder().encode(password);
  for(let i=0;i<32;i++) key[i]=pw[i%pw.length]^(i*7);
  const out=new Uint8Array(ct.length);
  for(let i=0;i<ct.length;i+=64){
    const block=chacha20Block(key,Math.floor(i/64),nonce);
    for(let j=0;j<64&&i+j<ct.length;j++) out[i+j]=ct[i+j]^block[j];
  }
  return new TextDecoder().decode(out);
}

// HMAC
async function hmacSign(text,key,hash){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(key||'key'),{name:'HMAC',hash},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',km,enc.encode(text));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// RSA+AES
async function rsaAesEncrypt(text){
  // Generate RSA key pair
  const kp=await crypto.subtle.generateKey({name:'RSA-OAEP',modulusLength:2048,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,['encrypt','decrypt']);
  // Generate AES key
  const aesKey=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  // Encrypt text with AES
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},aesKey,new TextEncoder().encode(text));
  // Export AES key
  const rawAes=await crypto.subtle.exportKey('raw',aesKey);
  // Encrypt AES key with RSA public key
  const encAesKey=await crypto.subtle.encrypt({name:'RSA-OAEP'},kp.publicKey,rawAes);
  // Export private key for storage
  const privKey=await crypto.subtle.exportKey('pkcs8',kp.privateKey);
  const privB64=btoa(String.fromCharCode(...new Uint8Array(privKey)));
  const encAesB64=btoa(String.fromCharCode(...new Uint8Array(encAesKey)));
  const ivB64=btoa(String.fromCharCode(...iv));
  const ctB64=btoa(String.fromCharCode(...new Uint8Array(ct)));
  return JSON.stringify({encAesKey:encAesB64,iv:ivB64,ct:ctB64,privateKey:privB64});
}
async function rsaAesDecrypt(text){
  const {encAesKey,iv,ct,privateKey}=JSON.parse(text);
  const privKeyBytes=Uint8Array.from(atob(privateKey),c=>c.charCodeAt(0));
  const privKey=await crypto.subtle.importKey('pkcs8',privKeyBytes,{name:'RSA-OAEP',hash:'SHA-256'},false,['decrypt']);
  const encAesBytes=Uint8Array.from(atob(encAesKey),c=>c.charCodeAt(0));
  const rawAes=await crypto.subtle.decrypt({name:'RSA-OAEP'},privKey,encAesBytes);
  const aesKey=await crypto.subtle.importKey('raw',rawAes,{name:'AES-GCM'},false,['decrypt']);
  const ivBytes=Uint8Array.from(atob(iv),c=>c.charCodeAt(0));
  const ctBytes=Uint8Array.from(atob(ct),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:ivBytes},aesKey,ctBytes);
  return new TextDecoder().decode(pt);
}

// ECDH + AES-GCM
async function ecdhEncrypt(text,password){
  // Use password to derive a static "peer" key, and generate ephemeral key
  // For simplicity: derive both keys from password via PBKDF2 with different salts
  const enc=new TextEncoder();
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const km=await crypto.subtle.importKey('raw',enc.encode(password||'key'),{name:'PBKDF2'},false,['deriveKey']);
  const aesKey=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt']);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},aesKey,enc.encode(text));
  const all=new Uint8Array(16+12+ct.byteLength);
  all.set(salt);all.set(iv,16);all.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...all));
}
async function ecdhDecrypt(text,password){
  const all=Uint8Array.from(atob(text),c=>c.charCodeAt(0));
  const salt=all.slice(0,16),iv=all.slice(16,28),ct=all.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(password||'key'),{name:'PBKDF2'},false,['deriveKey']);
  const aesKey=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},aesKey,ct);
  return new TextDecoder().decode(pt);
}

// AES+Caesar

  const shifted=caesarEncrypt(text,3);
  return await aesGcmEncrypt(shifted,password,256);
}

// SHA hash
async function hashText(text,algorithm){
  const buf=await crypto.subtle.digest(algorithm,new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ===================== Chinese Crypto =====================
const ChineseCrypto={
  encrypt:(text)=>{
    let result='';
    for(let i=0;i<text.length;i++){
      const code=text.charCodeAt(i);
      if(code>=0x4E00&&code<=0x9FA5){ result+=String.fromCharCode(((code-0x4E00+1234+i*7)%20902)+0x4E00); }
      else result+=text[i];
    }
    return result;
  },

    let result='';

      if(code>=0x4E00&&code<=0x9FA5){ let n=((code-0x4E00-1234-i*7)%20902); if(n<0)n+=20902; result+=String.fromCharCode(n+0x4E00); }

    }

  }

// ===================== Main processText =====================
async function processText(text,operation,algo,key){
  const enc=operation==='encrypt';
  if(!key&&ALGOS_REQUIRE_KEY.has(algo)&&!['hmac-sha256','hmac-sha512'].includes(algo)&&algo!=='rsaAes'){
    // Allow empty key for some algos
  }
  switch(algo){
    case 'chinese': return enc?ChineseCrypto.encrypt(text):ChineseCrypto.decrypt(text);
    case 'chinesePlus': return enc?ChineseCryptoPlus.encrypt(text,key):ChineseCryptoPlus.decrypt(text,key);

    case 'caesar': return enc?caesarEncrypt(text,key):caesarDecrypt(text,key);
    case 'vigenere': return enc?vigenereEncrypt(text,key):vigenereDecrypt(text,key);
    case 'autokey': return enc?autokeyEncrypt(text,key):autokeyDecrypt(text,key);
    case 'beaufort': return beaufortEncrypt(text,key);
    case 'rot13': return rot13(text);
    case 'rot47': return rot47(text);
    case 'atbash': return atbash(text);
    case 'affine': return enc?affineEncrypt(text,key||'5,8'):affineDecrypt(text,key||'5,8');
    case 'railfence': return enc?railfenceEncrypt(text,key):railfenceDecrypt(text,key);
    case 'coltrans': return enc?coltransEncrypt(text,key):coltransDecrypt(text,key);
    case 'playfair': return enc?playfairEncrypt(text,key):playfairDecrypt(text,key);
    case 'polybius': return enc?polybiusEncrypt(text):polybiusDecrypt(text);
    case 'hill2': return enc?hillEncrypt(text,key||'3,3,2,5'):hillDecrypt(text,key||'3,3,2,5');
    case 'adfgvx': return enc?adfgvxEncrypt(text,key):adfgvxDecrypt(text,key);
    case 'bifid': return enc?bifidEncrypt(text,key):bifidDecrypt(text,key);
    case 'foursquare': return enc?fourSquareEncrypt(text,key):fourSquareDecrypt(text,key);

    case 'xor': return enc?xorEncrypt(text,key):xorDecrypt(text,key);
    case 'rc4': return enc?rc4Encrypt(text,key):rc4Decrypt(text,key);
    case 'rc4drop': return enc?rc4dropEncrypt(text,key):rc4dropDecrypt(text,key);

    case 'base64': return enc?btoa(unescape(encodeURIComponent(text))):decodeURIComponent(escape(atob(text)));
    case 'base64url': return enc?btoa(unescape(encodeURIComponent(text))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''):decodeURIComponent(escape(atob(text.replace(/-/g,'+').replace(/_/g,'/'))));
    case 'base32': return enc?base32Encode(text):base32Decode(text);
    case 'base32hex': return enc?base32Encode(text,B32H_ALPHA):base32Decode(text,B32H_ALPHA);
    case 'base85': return enc?base85Encode(text):base85Decode(text);
    case 'base58': return enc?base58Encode(text):base58Decode(text);
    case 'base45': return enc?base45Encode(text):base45Decode(text);
    case 'urlencode': return enc?encodeURIComponent(text):decodeURIComponent(text);
    case 'hex': return enc?textToHex(text):hexToText(text);
    case 'binary': return enc?textToBinary(text):binaryToText(text);
    case 'octal': return enc?textToOctal(text):octalToText(text);
    case 'morse': return enc?morseEncode(text):morseDecode(text);
    case 'uuencode': return enc?uuEncode(text):uuDecode(text);
    case 'unicode': return enc?unicodeEscape(text):unicodeUnescape(text);

    case 'md5': return md5(text);
    case 'sha1': return await hashText(text,'SHA-1');
    case 'sha256': return await hashText(text,'SHA-256');
    case 'sha384': return await hashText(text,'SHA-384');
    case 'sha512': return await hashText(text,'SHA-512');
    case 'sha3-256': return sha3(text,256);
    case 'sha3-512': return sha3(text,512);
    case 'crc32': return crc32(text);
    case 'hmac-sha256': return await hmacSign(text,key,{name:'HMAC',hash:'SHA-256'});
    case 'hmac-sha512': return await hmacSign(text,key,{name:'HMAC',hash:'SHA-512'});

    case 'aes128gcm': return enc?await aesGcmEncrypt(text,key,128):await aesGcmDecrypt(text,key,128);
    case 'aes192gcm': return enc?await aesGcmEncrypt(text,key,192):await aesGcmDecrypt(text,key,192);
    case 'aes256gcm': return enc?await aesGcmEncrypt(text,key,256):await aesGcmDecrypt(text,key,256);
    case 'aes256cbc': return enc?await aesCbcEncrypt(text,key):await aesCbcDecrypt(text,key);
    case 'aes256ctr': return enc?await aesCtrEncrypt(text,key):await aesCtrDecrypt(text,key);
    case 'chacha20': return enc?chacha20Encrypt(text,key):chacha20Decrypt(text,key);
    case 'aesCaesar': return enc?await aesCaesarEncrypt(text,key):await aesCaesarDecrypt(text,key);
    case 'rsaAes': return enc?await rsaAesEncrypt(text):await rsaAesDecrypt(text);
    case 'ecdh': return enc?await ecdhEncrypt(text,key):await ecdhDecrypt(text,key);

    default: throw new Error('Unknown algorithm: '+algo);
  }
}

// ===================== Utilities =====================
function generatePassword(length=16){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
  const arr=new Uint32Array(length); crypto.getRandomValues(arr);
  return [...arr].map(n=>chars[n%chars.length]).join('');
}

function calculatePasswordStrength(pw){
  if(!pw) return 0; let s=0;
  if(pw.length>=8) s++; if(pw.length>=12) s++; if(pw.length>=16) s++;
  if(/[a-z]/.test(pw)) s++; if(/[A-Z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^a-zA-Z0-9]/.test(pw)) s++;
  return Math.min(s,7);
}

function updateStrengthLabel(pw){
  const s=calculatePasswordStrength(pw);
  const pct=(s/7)*100;
  DOM.passwordStrengthBar.style.width=pct+'%';
  DOM.passwordStrengthBar.style.backgroundColor=s<3?'var(--danger)':s<5?'var(--warning)':'var(--success)';
  DOM.strengthLabel.textContent=s<3?t('strengthWeak'):s<5?t('strengthFair'):s<6?t('strengthGood'):t('strengthVeryGood');
}

function showStatus(msg,type='info'){
  DOM.statusMsg.textContent=msg;
  DOM.statusMsg.style.display='block';
  const colors={success:'var(--success-light)#var(--success)',error:'var(--danger-light)#var(--danger)',warning:'var(--warning-light)#var(--warning)',info:'var(--surface2)#var(--text2)'};
  const c=type==='success'?{bg:'var(--success-light)',fg:'var(--success)'}:type==='error'?{bg:'var(--danger-light)',fg:'var(--danger)'}:type==='warning'?{bg:'var(--warning-light)',fg:'var(--warning)'}:{bg:'var(--surface2)',fg:'var(--text2)'};
  DOM.statusMsg.style.background=c.bg; DOM.statusMsg.style.color=c.fg;
  clearTimeout(DOM.statusMsg._timer);
  DOM.statusMsg._timer=setTimeout(()=>DOM.statusMsg.style.display='none',3500);
}

function updateKeyManagementVisibility(){
  DOM.keyManagementCard.classList.toggle('hidden',!ALGOS_REQUIRE_KEY.has(state.currentAlgo));
}

function formatFileSize(bytes){
  if(!bytes) return '0 B';
  const k=1024,s=['B','KB','MB','GB','TB'];
  const i=Math.floor(Math.log(bytes)/Math.log(k));
  return (bytes/Math.pow(k,i)).toFixed(2)+' '+s[i];
}

// ===================== Events =====================
DOM.languageSwitcher.addEventListener('click',e=>{ if(e.target.classList.contains('lang-btn')) switchLanguage(e.target.dataset.lang); });

DOM.passwordToggleBtn.addEventListener('click',()=>{
  const show=DOM.algoParam1.type==='password';
  DOM.algoParam1.type=show?'text':'password';
  DOM.passwordToggleBtn.textContent=show?'🙈':'👁️';
});

DOM.generatePasswordBtn.addEventListener('click',()=>{
  const pw=generatePassword();
  DOM.algoParam1.value=pw; DOM.algoParam1.type='text'; DOM.passwordToggleBtn.textContent='🙈';
  updateStrengthLabel(pw); showStatus(t('generatedStrongPassword'),'success');
});

DOM.algoParam1.addEventListener('input',e=>updateStrengthLabel(e.target.value));

DOM.algoButtonsContainer.addEventListener('click',e=>{
  if(!e.target.closest('.algo-btn')) return;
  const btn=e.target.closest('.algo-btn');
  document.querySelectorAll('.algo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.currentAlgo=btn.dataset.algo;
  DOM.keyMgmtTitle.textContent=btn.textContent.trim();
  updateKeyManagementVisibility();
  updateAlgoInfo();
  const isIrr=IRREVERSIBLE_ALGOS.has(state.currentAlgo);
  DOM.decryptBtn.disabled=isIrr; DOM.decryptBtn.title=isIrr?t('hashCannotDecrypt'):'';
});

DOM.tabSwitcher.addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('.tab-switcher button').forEach(b=>b.classList.remove('active-tab'));
  e.target.classList.add('active-tab');
  state.currentTab=e.target.dataset.tab;
  DOM.textInputArea.style.display=state.currentTab==='text'?'block':'none';
  DOM.fileInputArea.style.display=state.currentTab==='file'?'block':'none';
});

DOM.selectFileBtn.addEventListener('click',()=>DOM.fileInput.click());

DOM.fileInput.addEventListener('change',e=>{
  const f=e.target.files[0];
  if(f){ state.selectedFile=f; DOM.fileInfo.textContent=`${t('selectedFile')}: ${f.name} (${formatFileSize(f.size)})`; }
});

DOM.plaintextInput.addEventListener('input',()=>{
  const n=DOM.plaintextInput.value.length;
  DOM.inputCharCount.textContent=n?`${n} ${t('characters')}`:''
});

DOM.swapBtn.addEventListener('click',()=>{
  const tmp=DOM.plaintextInput.value;
  DOM.plaintextInput.value=DOM.outputText.value;
  DOM.outputText.value=tmp;
  DOM.plaintextInput.dispatchEvent(new Event('input'));
});

DOM.encryptBtn.addEventListener('click',async()=>{
  if(state.isProcessing) return;
  if(IRREVERSIBLE_ALGOS.has(state.currentAlgo)){
    const r=await Swal.fire({title:t('irreversibleWarningTitle'),html:`<div class="irreversible-warning">${t('hashIrreversibleWarning')}</div>`,icon:'warning',showCancelButton:true,confirmButtonColor:'#1a56db',cancelButtonColor:'#c92a2a',confirmButtonText:t('confirmEncrypt'),cancelButtonText:t('cancel')});
    if(!r.isConfirmed) return;
  }
  await performOperation('encrypt');
});

DOM.decryptBtn.addEventListener('click',async()=>{
  if(state.isProcessing||IRREVERSIBLE_ALGOS.has(state.currentAlgo)) return;
  await performOperation('decrypt');
});

DOM.clearAllBtn.addEventListener('click',()=>{
  DOM.plaintextInput.value=''; DOM.outputText.value=''; DOM.algoParam1.value='';
  DOM.passwordStrengthBar.style.width='0'; DOM.strengthLabel.textContent='';
  DOM.fileInfo.textContent=''; state.selectedFile=null;
  DOM.downloadOutputBtn.style.display='none'; DOM.outputInfo.textContent='';
  DOM.inputCharCount.textContent='';
  showStatus(t('clearedAll'),'info');
});

DOM.copyOutputBtn.addEventListener('click',async()=>{
  try{ await navigator.clipboard.writeText(DOM.outputText.value); showStatus(t('copiedToClipboard'),'success'); }
  catch{ showStatus(t('copyFailed'),'error'); }
});

DOM.cancelBtn.addEventListener('click',()=>{ if(state.abortController) state.abortController.abort(); });

DOM.downloadOutputBtn.addEventListener('click',()=>{
  const text=DOM.outputText.value;
  if(!text) return;
  const blob=new Blob([text],{type:'text/plain'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`encrypted_${Date.now()}.txt`; a.click();
  URL.revokeObjectURL(url);
});

// Collapsible
DOM.algosHeader.addEventListener('click',()=>{
  const c=DOM.algosContent, icon=DOM.algosHeader.querySelector('.toggle-icon');
  if(c.style.maxHeight==='none'||c.style.maxHeight){
    c.style.maxHeight=c.scrollHeight+'px'; c.offsetHeight; c.style.maxHeight='0'; icon.style.transform='rotate(-90deg)';
  } else {
    c.style.maxHeight=c.scrollHeight+'px'; icon.style.transform='rotate(0deg)';
    c.addEventListener('transitionend',function h(){ c.style.maxHeight='none'; c.removeEventListener('transitionend',h); });
  }
});

async function performOperation(operation){
  try{
    state.isProcessing=true; DOM.encryptBtn.disabled=true; DOM.decryptBtn.disabled=true;
    DOM.cancelBtn.style.display='inline-flex'; DOM.operationStatus.textContent=t('processing');
    state.abortController=new AbortController();

    if(state.currentTab==='text'){
      const input=DOM.plaintextInput.value;
      if(!input){ showStatus(t('pleaseEnterText'),'warning'); return; }
      const key=DOM.algoParam1.value;
      const result=await processText(input,operation,state.currentAlgo,key);
      DOM.outputText.value=result;
      DOM.outputInfo.textContent=`${t('processingComplete')} ${result.length} ${t('characters')}`;
      DOM.downloadOutputBtn.style.display='inline-flex';
      showStatus(t(operation==='encrypt'?'encryptionSuccess':'decryptionSuccess'),'success');
    } else {
      if(!state.selectedFile){ showStatus(t('pleaseSelectFile'),'warning'); return; }
      DOM.operationStatus.textContent=t('fileProcessing');
      DOM.progressBarWrap.style.display='block';
      DOM.progressBar.style.width='0';

      const reader=new FileReader();
      const text=await new Promise((res,rej)=>{ reader.onload=e=>res(e.target.result); reader.onerror=rej; reader.readAsText(state.selectedFile,'utf-8'); });

      DOM.progressBar.style.width='50%';
      const key=DOM.algoParam1.value;
      const result=await processText(text,operation,state.currentAlgo,key);
      DOM.progressBar.style.width='100%';

      DOM.outputText.value=result;
      DOM.outputInfo.textContent=`${t(operation==='encrypt'?'fileEncryptionComplete':'fileDecryptionComplete')}: ${state.selectedFile.name}`;
      DOM.downloadOutputBtn.style.display='inline-flex';
      showStatus(t(operation==='encrypt'?'encryptionSuccess':'decryptionSuccess'),'success');
    }
  } catch(err){
    console.error(err);
    showStatus(t(operation==='encrypt'?'encryptionFailed':'decryptionFailed')+(err.message||String(err)),'error');
  } finally{
    state.isProcessing=false; DOM.encryptBtn.disabled=false;
    if(!IRREVERSIBLE_ALGOS.has(state.currentAlgo)) DOM.decryptBtn.disabled=false;
    DOM.cancelBtn.style.display='none'; DOM.operationStatus.textContent='';
    state.abortController=null;
    setTimeout(()=>{ DOM.progressBarWrap.style.display='none'; DOM.progressBar.style.width='0'; },800);
  }
}

// Init
document.addEventListener('DOMContentLoaded',()=>{
  const lang=detectBrowserLanguage();
  switchLanguage(lang);
  updatePasswordStrength('');
  updateKeyManagementVisibility();
  updateAlgoInfo();
});
</script>
