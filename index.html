<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>全算法加密工具 · 修复与增强</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --text: #1a1a2e;
      --text2: #495057;
      --text3: #6c757d;
      --border: #dee2e6;
      --border2: #ced4da;
      --accent: #1a56db;
      --accent-hover: #1647b8;
      --accent-light: #e8f0fe;
      --danger: #c92a2a;
      --danger-light: #fff5f5;
      --warning: #e67700;
      --warning-light: #fff9f0;
      --success: #2b8a3e;
      --success-light: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-sm: 6px;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
      --transition: 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1100px; margin:0 auto; padding:24px 20px 48px; }
    .header { text-align:center; padding:32px 0 24px; border-bottom:1px solid var(--border); margin-bottom:28px; }
    .header .icon { display:inline-block; width:48px; height:48px; background:var(--accent-light); border-radius:12px; margin-bottom:12px; line-height:48px; font-size:24px; }
    .header h1 { font-size:1.75rem; font-weight:700; letter-spacing:-0.02em; color:var(--text); margin:0; }
    .header .subtitle { font-size:0.9rem; color:var(--text3); margin-top:4px; }
    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:24px; margin-bottom:16px; box-shadow:var(--shadow-sm);
    }
    .card-header { font-weight:600; font-size:0.95rem; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:var(--text); }
    .card-header .dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .algos-wrapper {
      display:flex; flex-wrap:wrap; gap:10px;
    }
    .algo-btn {
      padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      background:var(--surface); cursor:pointer; text-align:center; transition:all var(--transition);
      font-family:inherit; font-size:0.8rem; color:var(--text2); white-space:nowrap;
    }
    .algo-btn:hover { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .algo-btn.active {
      border-color:var(--accent); background:var(--accent-light); color:var(--accent);
      font-weight:600; box-shadow:0 0 0 2px rgba(26,86,219,0.15);
    }
    textarea {
      width:100%; min-height:120px; padding:12px 14px; border:1.5px solid var(--border2);
      border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.9rem;
      resize:vertical; background:var(--surface2); color:var(--text); transition:border-color var(--transition);
    }
    textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,0.08); background:var(--surface); }
    textarea::placeholder { color:#adb5bd; }
    input[type="text"], input[type="password"], input[type="number"], input[type="file"] {
      width:100%; padding:10px 14px; border:1.5px solid var(--border2); border-radius:var(--radius-sm);
      font-family:inherit; font-size:0.9rem; background:var(--surface2); color:var(--text);
      transition:all var(--transition);
    }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,0.08); background:var(--surface); }
    label { display:block; font-weight:500; font-size:0.85rem; color:var(--text2); margin-bottom:6px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:10px 20px; border-radius:var(--radius-sm); font-family:inherit; font-size:0.9rem;
      font-weight:500; cursor:pointer; border:none; transition:all var(--transition);
      white-space:nowrap; letter-spacing:0.01em;
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); box-shadow:var(--shadow); }
    .btn-secondary { background:var(--surface2); color:var(--text2); border:1.5px solid var(--border2); }
    .btn-secondary:hover { background:#e9ecef; border-color:#adb5bd; }
    .btn-danger { background:var(--danger-light); color:var(--danger); border:1.5px solid #ffc9c9; }
    .btn-danger:hover { background:#ffe3e3; border-color:#ffa8a8; }
    .btn-sm { padding:6px 14px; font-size:0.8rem; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; pointer-events:none; }
    .btn-group { display:flex; gap:10px; flex-wrap:wrap; }
    .output-area { position:relative; }
    .output-area textarea { background:#fafbfc; border-color:#d0d5dd; color:#1a1a2e; min-height:100px; font-size:0.82rem; }
    .copy-btn {
      position:absolute; top:8px; right:8px; padding:5px 12px; font-size:0.75rem;
      background:var(--surface); border:1px solid var(--border2); border-radius:4px;
      cursor:pointer; transition:all var(--transition); color:var(--text3);
    }
    .copy-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
    .key-display {
      background:#fafbfc; border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 14px; font-family:var(--font-mono); font-size:0.75rem; word-break:break-all;
      max-height:80px; overflow-y:auto; color:var(--text2); line-height:1.5; white-space:pre-wrap;
    }
    .status-msg {
      padding:10px 14px; border-radius:var(--radius-sm); font-size:0.85rem; margin-top:10px;
      display:none; font-weight:500;
    }
    .status-msg.success{display:block;background:var(--success-light);color:var(--success);border:1px solid #b2f2bb;}
    .status-msg.error{display:block;background:var(--danger-light);color:var(--danger);border:1px solid #ffc9c9;}
    .status-msg.info{display:block;background:var(--accent-light);color:var(--accent);border:1px solid #bac8ff;}
    .status-msg.warning{display:block;background:var(--warning-light);color:var(--warning);border:1px solid #ffd8a8;}
    .spinner {
      display:inline-block; width:16px; height:16px; border:2px solid #ccc;
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    @keyframes spin { to{transform:rotate(360deg);} }
    .file-input-wrapper { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .file-info { font-size:0.8rem; color:var(--text3); font-family:var(--font-mono); }
    .tab-switcher { display:flex; gap:0; margin-bottom:16px; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; width:fit-content; }
    .tab-switcher button {
      padding:8px 20px; border:none; background:var(--surface2); cursor:pointer;
      font-family:inherit; font-size:0.85rem; color:var(--text3); transition:all var(--transition);
    }
    .tab-switcher button.active-tab { background:var(--accent); color:#fff; font-weight:500; }
    .info-text { font-size:0.75rem; color:var(--text3); margin-top:4px; }
    .key-param-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .key-param-row label { margin-bottom:0; white-space:nowrap; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🔐</div>
    <h1>全算法加密工具</h1>
    <p class="subtitle">纯浏览器端 · 40+种算法 · 文字与文件支持</p>
  </div>

  <div class="card">
    <div class="card-header">🔒 选择加密算法 <span style="font-weight:400;font-size:0.8rem;margin-left:8px;">（点击切换）</span></div>
    <div class="algos-wrapper" id="algoButtonsContainer"></div>
  </div>

  <div class="card" id="keyManagementCard">
    <div class="card-header" id="keyMgmtHeader"><span class="dot"></span> 密钥与参数</div>
    <div id="keyMgmtContent"></div>
  </div>

  <div class="card">
    <div class="card-header">📝 输入模式</div>
    <div class="tab-switcher" id="tabSwitcher">
      <button class="active-tab" data-tab="text">📝 文字输入</button>
      <button data-tab="file">📁 文件加密</button>
    </div>
    <div id="textInputArea">
      <label for="plaintextInput">输入明文（解密时粘贴密文）</label>
      <textarea id="plaintextInput" placeholder="在此输入要加密的文字…"></textarea>
    </div>
    <div id="fileInputArea" style="display:none;">
      <label for="fileInput">选择要加密的文件</label>
      <div class="file-input-wrapper">
        <input type="file" id="fileInput">
        <span class="file-info" id="fileInfo">未选择文件</span>
      </div>
      <div class="info-text">支持任意类型文件。加密后将下载 .enc 文件（某些算法为文本输出）。</div>
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <div class="card">
    <div class="btn-group">
      <button class="btn btn-primary" id="encryptBtn">🔒 加密</button>
      <button class="btn btn-secondary" id="decryptBtn">🔓 解密</button>
      <button class="btn btn-danger btn-sm" id="clearAllBtn">🗑️ 一键清空</button>
    </div>
    <div id="operationStatus" style="margin-top:8px;font-size:0.8rem;color:var(--text3);"></div>
  </div>

  <div class="card">
    <div class="card-header">📤 输出结果</div>
    <div class="output-area">
      <textarea id="outputText" placeholder="加密或解密结果将显示在这里…" readonly></textarea>
      <button class="copy-btn" id="copyOutputBtn" title="复制结果">📋 复制</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-sm" id="downloadOutputBtn" style="display:none;">💾 下载文件</button>
      <span id="outputInfo" style="font-size:0.78rem;color:var(--text3);align-self:center;"></span>
    </div>
  </div>

  <div class="card" style="background:var(--surface2);border-left:3px solid var(--accent);">
    <div style="font-size:0.8rem;color:var(--text2);line-height:1.7;">
      <strong>🛡️ 安全说明：</strong>所有运算在浏览器本地执行。古典密码仅用于教学，现代密码使用 Web Crypto API。请保管好密钥，丢失无法恢复。
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 算法定义（新增4种古典密码） ----------
    const algorithms = [
      { id: 'caesar', name: '凯撒密码', category: 'classic', needsKey: true, keyType: 'number', keyOpts: {label:'移位值 (1-25)', min:1, max:25, default:3} },
      { id: 'vigenere', name: '维吉尼亚', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'SECRET'} },
      { id: 'autokey', name: 'Autokey', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'初始密钥 (字母)', placeholder:'AUTOKEY'} },
      { id: 'beaufort', name: 'Beaufort', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'BEAUFORT'} },
      { id: 'rot13', name: 'ROT13', category: 'classic', needsKey: false },
      { id: 'atbash', name: 'Atbash', category: 'classic', needsKey: false },
      { id: 'railfence', name: '栅栏密码', category: 'classic', needsKey: true, keyType: 'number', keyOpts: {label:'栅栏数', min:2, max:20, default:3} },
      { id: 'coltrans', name: '列换位', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'KEY'} },
      { id: 'playfair', name: 'Playfair', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'PLAYFAIR'} },
      { id: 'polybius', name: 'Polybius方阵', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'密钥词 (字母)', placeholder:'POLYBIUS'} },
      { id: 'hill2', name: 'Hill (2x2)', category: 'classic', needsKey: true, keyType: 'text', keyOpts: {label:'矩阵密钥 (4数字逗号分隔)', placeholder:'3,3,2,5'} },
      { id: 'xor', name: 'XOR 异或', category: 'simple', needsKey: true, keyType: 'text', keyOpts: {label:'密码', placeholder:'任意字符'} },
      { id: 'rc4', name: 'RC4', category: 'simple', needsKey: true, keyType: 'text', keyOpts: {label:'密钥', placeholder:'输入密钥'} },
      { id: 'base64', name: 'Base64', category: 'encoding', needsKey: false },
      { id: 'base32', name: 'Base32', category: 'encoding', needsKey: false },
      { id: 'base85', name: 'Base85', category: 'encoding', needsKey: false },
      { id: 'base58', name: 'Base58', category: 'encoding', needsKey: false },
      { id: 'urlencode', name: 'URL编码', category: 'encoding', needsKey: false },
      { id: 'hex', name: 'Hex 十六进制', category: 'encoding', needsKey: false },
      { id: 'morse', name: '摩斯电码', category: 'encoding', needsKey: false },
      { id: 'aes128gcm', name: 'AES-128-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes192gcm', name: 'AES-192-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256gcm', name: 'AES-256-GCM', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256cbc', name: 'AES-256-CBC', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aes256ctr', name: 'AES-256-CTR', category: 'modern', needsKey: true, keyType: 'password', keyOpts: {label:'密码', placeholder:'输入密码'} },
      { id: 'aesCaesar', name: 'AES+凯撒', category: 'modern', needsKey: true, keyType: 'double', keyOpts: {label1:'AES密码', label2:'移位(1-255)', defaultShift:7} },
      { id: 'rsaAes', name: 'RSA+AES', category: 'asymmetric', needsKey: true, keyType: 'rsa' },
      { id: 'rsaEcdsa', name: 'RSA+ECDS', category: 'asymmetric', needsKey: true, keyType: 'rsaecdsa' }
    ];

    let currentAlgoId = 'aes256gcm';
    let currentMode = 'text';

    // RSA/ECDSA 密钥存储
    let rsaKeyPairL7 = null, rsaKeyPairL8 = null, ecdsaKeyPair = null;
    let rsaPubB64L7 = null, rsaPrivB64L7 = null;
    let rsaPubB64L8 = null, rsaPrivB64L8 = null;
    let ecdsaPubB64 = null, ecdsaPrivB64 = null;

    let lastEncFileData = null, lastEncFileName = null;
    let lastDecFileData = null, lastDecFileName = null;

    const algoContainer = document.getElementById('algoButtonsContainer');
    const keyMgmtContent = document.getElementById('keyMgmtContent');
    const keyMgmtHeader = document.getElementById('keyMgmtHeader');
    const plaintextInput = document.getElementById('plaintextInput');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const outputText = document.getElementById('outputText');
    const statusMsg = document.getElementById('statusMsg');
    const operationStatus = document.getElementById('operationStatus');
    const encryptBtn = document.getElementById('encryptBtn');
    const decryptBtn = document.getElementById('decryptBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const copyOutputBtn = document.getElementById('copyOutputBtn');
    const downloadOutputBtn = document.getElementById('downloadOutputBtn');
    const outputInfo = document.getElementById('outputInfo');
    const tabBtns = document.querySelectorAll('#tabSwitcher button');
    const textInputArea = document.getElementById('textInputArea');
    const fileInputArea = document.getElementById('fileInputArea');

    // ---------- 工具函数（修复大文件转Base64栈溢出）----------
    function bufToBase64(buf) {
      const bytes = new Uint8Array(buf);
      const chunkSize = 0x8000;
      let binary = '';
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.slice(i, i + chunkSize));
      }
      return btoa(binary);
    }
    function base64ToBuf(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }
    function strToBuf(str) { return new TextEncoder().encode(str); }
    function bufToStr(buf) { return new TextDecoder().decode(buf); }

    function showStatus(msg, type) {
      statusMsg.textContent = msg; statusMsg.className = 'status-msg ' + type; statusMsg.style.display = 'block';
      setTimeout(() => { if (statusMsg.textContent === msg) { statusMsg.style.display = 'none'; statusMsg.className = 'status-msg'; } }, 8000);
    }
    function hideStatus() { statusMsg.style.display = 'none'; statusMsg.className = 'status-msg'; }
    function setOps(msg) { operationStatus.textContent = msg; }

    // ---------- 古典密码实现 ----------
    const caesarShiftText = (text, shift) => {
      shift = ((shift % 26) + 26) % 26;
      return text.replace(/[a-zA-Z]/g, c => {
        const base = c <= 'Z' ? 65 : 97;
        return String.fromCharCode((c.charCodeAt(0) - base + shift) % 26 + base);
      });
    };
    const rot13 = text => caesarShiftText(text, 13);
    const atbash = text => text.replace(/[a-zA-Z]/g, c => {
      const base = c <= 'Z' ? 65 : 97;
      return String.fromCharCode(25 - (c.charCodeAt(0) - base) + base);
    });

    const vigenereText = (text, key, decrypt = false) => {
      const clean = key.replace(/[^a-zA-Z]/g, '').toUpperCase();
      if (!clean) throw new Error('密钥需包含字母');
      let res = '', j = 0;
      for (const c of text) {
        const code = c.charCodeAt(0);
        const shift = clean.charCodeAt(j % clean.length) - 65;
        if (code >= 65 && code <= 90) {
          res += String.fromCharCode(((code - 65 + (decrypt ? 26 - shift : shift)) % 26) + 65); j++;
        } else if (code >= 97 && code <= 122) {
          res += String.fromCharCode(((code - 97 + (decrypt ? 26 - shift : shift)) % 26) + 97); j++;
        } else res += c;
      }
      return res;
    };

    // Autokey 密码
    const autokeyText = (text, key, decrypt = false) => {
      const cleanKey = key.replace(/[^a-zA-Z]/g, '').toUpperCase();
      if (!cleanKey) throw new Error('密钥需包含字母');
      let res = '';
      const keyStream = decrypt ? cleanKey : (cleanKey + text.replace(/[^a-zA-Z]/g, '').toUpperCase());
      let ki = 0;
      for (const c of text) {
        const code = c.charCodeAt(0);
        const shift = keyStream.charCodeAt(ki % keyStream.length) - 65;
        if (code >= 65 && code <= 90) {
          const newChar = String.fromCharCode(((code - 65 + (decrypt ? 26 - shift : shift)) % 26) + 65);
          res += newChar;
          if (!decrypt) keyStream += newChar;
          ki++;
        } else if (code >= 97 && code <= 122) {
          const newChar = String.fromCharCode(((code - 97 + (decrypt ? 26 - shift : shift)) % 26) + 97);
          res += newChar;
          if (!decrypt) keyStream += newChar.toUpperCase();
          ki++;
        } else res += c;
      }
      return res;
    };

    // Beaufort 密码
    const beaufortText = (text, key, decrypt = false) => {
      // Beaufort is its own inverse
      const clean = key.replace(/[^a-zA-Z]/g, '').toUpperCase();
      if (!clean) throw new Error('密钥需包含字母');
      let res = '', j = 0;
      for (const c of text) {
        const code = c.charCodeAt(0);
        const shift = clean.charCodeAt(j % clean.length) - 65;
        if (code >= 65 && code <= 90) {
          res += String.fromCharCode((65 + (shift - (code - 65) + 26) % 26));
          j++;
        } else if (code >= 97 && code <= 122) {
          res += String.fromCharCode((97 + (shift - (code - 97) + 26) % 26));
          j++;
        } else res += c;
      }
      return res;
    };

    // 栅栏密码修复（参数使用 rails = params.shift）
    const railfenceEnc = (text, rails) => {
      rails = parseInt(rails);
      if (isNaN(rails) || rails < 2) return text;
      const fence = Array.from({ length: rails }, () => []);
      let dir = 1, row = 0;
      for (const ch of text) {
        fence[row].push(ch);
        row += dir;
        if (row === rails - 1) dir = -1;
        else if (row === 0) dir = 1;
      }
      return fence.flat().join('');
    };
    const railfenceDec = (text, rails) => {
      rails = parseInt(rails);
      if (isNaN(rails) || rails < 2) return text;
      const len = text.length;
      const pos = new Array(len);
      let dir = 1, row = 0;
      for (let i = 0; i < len; i++) { pos[i] = row; row += dir; if (row === rails - 1) dir = -1; else if (row === 0) dir = 1; }
      const counts = new Array(rails).fill(0);
      for (let i = 0; i < len; i++) counts[pos[i]]++;
      const chunks = [];
      let idx = 0;
      for (let r = 0; r < rails; r++) { chunks[r] = text.slice(idx, idx + counts[r]); idx += counts[r]; }
      const pointers = new Array(rails).fill(0);
      let result = '';
      for (let i = 0; i < len; i++) {
        const r = pos[i];
        result += chunks[r][pointers[r]++];
      }
      return result;
    };

    const coltransEnc = (text, key) => {
      const order = [...key].map((c, i) => ({ c: c.toUpperCase().charCodeAt(0), i })).sort((a, b) => a.c - b.c).map(o => o.i);
      const cols = key.length;

        case 'text': {
          const opt = algo.keyOpts;
          form.innerHTML = `<label>${opt.label}</label><input type="text" id="algoParam1" placeholder="${opt.placeholder || ''}">`;
          break;
        }
        case 'password': {
          const opt = algo.keyOpts;
          form.innerHTML = `<label>${opt.label}</label><input type="password" id="algoParam1" placeholder="${opt.placeholder || ''}" autocomplete="off">`;
          break;
        }
        case 'double': {
          form.innerHTML = `<div class="key-param-row"><label>${algo.keyOpts.label1}</label><input type="password" id="algoParam1" placeholder="密码" autocomplete="off"></div>
                            <div class="key-param-row"><label>${algo.keyOpts.label2}</label><input type="number" id="algoParam2" value="${algo.keyOpts.defaultShift}" min="1" max="255" style="width:100px;"></div>`;
          break;
        }
        case 'rsa':
          form.innerHTML = buildRSAUI('L7');
          break;
        case 'rsaecdsa':
          form.innerHTML = buildRSAECDSAUI();
          break;
      }
      keyMgmtContent.appendChild(form);
    }
    function buildRSAUI(suffix) {
      const su = suffix === 'L7' ? 'L7' : 'L8';
      return `
        <div><button class="btn btn-primary btn-sm" id="genRSA${su}">⚡ 生成RSA-4096密钥对</button><span class="info-text" style="margin-left:8px;">可能需10-30秒</span></div>
        <label style="margin-top:8px;">📤 公钥</label><div class="key-display" id="rsaPubDisplay${su}">尚未生成</div><button class="btn btn-secondary btn-sm" id="copyRsaPub${su}">📋 复制</button>
        <label>🔐 私钥</label><div class="key-display" id="rsaPrivDisplay${su}" style="color:#c92a2a;">尚未生成</div><button class="btn btn-danger btn-sm" id="copyRsaPriv${su}">⚠️ 复制</button>
        <div style="margin-top:8px;"><input type="text" placeholder="粘贴公钥Base64" id="importRsaPub${su}"><button class="btn btn-secondary btn-sm" id="importRsaPubBtn${su}">导入公钥</button></div>
        <div><input type="text" placeholder="粘贴私钥Base64" id="importRsaPriv${su}"><button class="btn btn-danger btn-sm" id="importRsaPrivBtn${su}">导入私钥</button></div>
      `;
    }
    function buildRSAECDSAUI() {
      return `
        <div><button class="btn btn-primary btn-sm" id="genAllKeys">⚡ 生成全部密钥(RSA+ECDSA)</button></div>
        <details open><summary>RSA密钥对</summary>
          ${buildRSAUI('L8')}
        </details>
        <details open><summary>ECDSA密钥对</summary>
          <label>公钥</label><div class="key-display" id="ecdsaPubDisplay">尚未生成</div><button class="btn btn-secondary btn-sm" id="copyEcdsaPub">📋 复制</button>
          <label>私钥</label><div class="key-display" id="ecdsaPrivDisplay" style="color:#c92a2a;">尚未生成</div><button class="btn btn-danger btn-sm" id="copyEcdsaPriv">⚠️ 复制</button>
          <div><input type="text" placeholder="导入公钥" id="importEcdsaPub"><button class="btn btn-secondary btn-sm" id="importEcdsaPubBtn">导入</button></div>
          <div><input type="text" placeholder="导入私钥" id="importEcdsaPriv"><button class="btn btn-danger btn-sm" id="importEcdsaPrivBtn">导入</button></div>
        </details>
      `;
    }

    // ---------- 密钥事件委托（已移除 initRSAEvents 调用）----------
    keyMgmtContent.addEventListener('click', async (e) => {
      const t = e.target;
      if (t.id === 'genRSAL7' || t.id === 'genRSAL8') {
        const level = t.id.includes('L7') ? 'L7' : 'L8';
        await generateRSAHandler(level);
      } else if (t.id === 'genAllKeys') {
        await generateAllHandler();
      } else if (t.id.startsWith('copy')) {
        await copyKeyHandler(t.id);
      } else if (t.id.startsWith('importRsaPubBtn') || t.id.startsWith('importRsaPrivBtn') || t.id.startsWith('importEcdsa')) {
        await importKeyHandler(t.id);
      }
    });

    async function generateRSAHandler(level) {
      try {
        const pair = await genRSA();
        const pubB64 = await exportRSAKey(pair.publicKey, 'public');
        const privB64 = await exportRSAKey(pair.privateKey, 'private');
        if (level === 'L7') { rsaKeyPairL7 = pair; rsaPubB64L7 = pubB64; rsaPrivB64L7 = privB64; }
        else { rsaKeyPairL8 = pair; rsaPubB64L8 = pubB64; rsaPrivB64L8 = privB64; }
        document.getElementById('rsaPubDisplay' + level).textContent = pubB64;
        document.getElementById('rsaPrivDisplay' + level).textContent = privB64;
        showStatus('✅ RSA密钥对生成成功', 'success');
      } catch (e) { showStatus('❌ 生成失败:' + e.message, 'error'); }
    }
    async function generateAllHandler() {
      try {
        rsaKeyPairL8 = await genRSA(); ecdsaKeyPair = await genECDSA();
        rsaPubB64L8 = await exportRSAKey(rsaKeyPairL8.publicKey, 'public'); rsaPrivB64L8 = await exportRSAKey(rsaKeyPairL8.privateKey, 'private');
        ecdsaPubB64 = await exportECDSAKey(ecdsaKeyPair.publicKey, 'public'); ecdsaPrivB64 = await exportECDSAKey(ecdsaKeyPair.privateKey, 'private');
        document.getElementById('rsaPubDisplayL8').textContent = rsaPubB64L8; document.getElementById('rsaPrivDisplayL8').textContent = rsaPrivB64L8;
        document.getElementById('ecdsaPubDisplay').textContent = ecdsaPubB64; document.getElementById('ecdsaPrivDisplay').textContent = ecdsaPrivB64;
        showStatus('✅ 全部密钥生成成功', 'success');
      } catch (e) { showStatus('❌ 生成失败:' + e.message, 'error'); }
    }
    async function exportECDSAKey(key, type) {
      return btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey(type === 'public' ? 'spki' : 'pkcs8', key))));
    }
    async function importECDSAPub(b64) { return crypto.subtle.importKey('spki', base64ToBuf(b64), { name: 'ECDSA', namedCurve: 'P-384' }, true, ['verify']); }
    async function importECDSAPriv(b64) { return crypto.subtle.importKey('pkcs8', base64ToBuf(b64), { name: 'ECDSA', namedCurve: 'P-384' }, true, ['sign']); }
    async function copyKeyHandler(id) {
      let val = '';
      if (id.includes('RsaPubL7')) val = rsaPubB64L7; else if (id.includes('RsaPrivL7')) val = rsaPrivB64L7;
      else if (id.includes('RsaPubL8')) val = rsaPubB64L8; else if (id.includes('RsaPrivL8')) val = rsaPrivB64L8;
      else if (id.includes('EcdsaPub')) val = ecdsaPubB64; else if (id.includes('EcdsaPriv')) val = ecdsaPrivB64;
      if (!val) { showStatus('⚠️ 密钥未生成', 'warning'); return; }
      try { await navigator.clipboard.writeText(val); showStatus('📋 已复制', 'success'); } catch { showStatus('复制失败', 'error'); }
    }
    async function importKeyHandler(id) {
      const inputId = id.replace('Btn', '');
      const b64 = document.getElementById(inputId).value.trim();
      if (!b64) { showStatus('粘贴密钥', 'warning'); return; }
      try {
        if (id.includes('RsaPubL7')) { rsaKeyPairL7 = rsaKeyPairL7 || {}; rsaKeyPairL7.publicKey = await importRSAPub(b64); rsaPubB64L7 = b64; document.getElementById('rsaPubDisplayL7').textContent = b64; }
        else if (id.includes('RsaPrivL7')) { rsaKeyPairL7 = rsaKeyPairL7 || {}; rsaKeyPairL7.privateKey = await importRSAPriv(b64); rsaPrivB64L7 = b64; document.getElementById('rsaPrivDisplayL7').textContent = b64; }
        else if (id.includes('RsaPubL8')) { rsaKeyPairL8 = rsaKeyPairL8 || {}; rsaKeyPairL8.publicKey = await importRSAPub(b64); rsaPubB64L8 = b64; document.getElementById('rsaPubDisplayL8').textContent = b64; }
        else if (id.includes('RsaPrivL8')) { rsaKeyPairL8 = rsaKeyPairL8 || {}; rsaKeyPairL8.privateKey = await importRSAPriv(b64); rsaPrivB64L8 = b64; document.getElementById('rsaPrivDisplayL8').textContent = b64; }
        else if (id.includes('EcdsaPub')) { ecdsaKeyPair = ecdsaKeyPair || {}; ecdsaKeyPair.publicKey = await importECDSAPub(b64); ecdsaPubB64 = b64; document.getElementById('ecdsaPubDisplay').textContent = b64; }
        else if (id.includes('EcdsaPriv')) { ecdsaKeyPair = ecdsaKeyPair || {}; ecdsaKeyPair.privateKey = await importECDSAPriv(b64); ecdsaPrivB64 = b64; document.getElementById('ecdsaPrivDisplay').textContent = b64; }
        showStatus('✅ 导入成功', 'success');
      } catch (e) { showStatus('❌ 导入失败:' + e.message, 'error'); }
    }

    function getCurrentParams() {
      const algo = getAlgoDef(currentAlgoId);
      if (!algo.needsKey) return {};
      const params = {};
      switch (algo.keyType) {
        case 'number': params.shift = parseInt(document.getElementById('algoParam1')?.value) || algo.keyOpts.default; break;
        case 'text': params.key = document.getElementById('algoParam1')?.value || ''; break;
        case 'password': params.password = document.getElementById('algoParam1')?.value || ''; break;
        case 'double': params.password = document.getElementById('algoParam1')?.value || ''; params.shift = parseInt(document.getElementById('algoParam2')?.value) || 7; break;
        case 'rsa': case 'rsaecdsa': break;
      }
      return params;
    }

    // ---------- 加密/解密按钮（优化）----------
    encryptBtn.addEventListener('click', async () => {
      hideStatus(); setOps(''); outputText.value = ''; downloadOutputBtn.style.display = 'none'; lastEncFileData = null;
      try {
        const params = getCurrentParams();
        if (currentMode === 'text') {
          const plain = plaintextInput.value;
          if (!plain) { showStatus('⚠️ 请输入文字', 'warning'); return; }
          setOps('加密中…');
          const result = await processEncrypt(strToBuf(plain), currentAlgoId, params, true);
          outputText.value = typeof result === 'string' ? result : bufToBase64(result);
          setOps('✅ 加密完成');
          showStatus('✅ 加密成功', 'success');
        } else {
          if (!fileInput.files.length) { showStatus('⚠️ 请选择文件', 'warning'); return; }
          const file = fileInput.files[0];
          setOps('读取文件…');
          const fileBuf = await file.arrayBuffer();
          setOps('加密中…');
          const result = await processEncrypt(fileBuf, currentAlgoId, params, false);
          lastEncFileData = typeof result === 'string' ? strToBuf(result) : result;
          lastEncFileName = file.name + '.enc';
          outputText.value = `✅ 文件加密完成！原始：${file.name} 大小：${(lastEncFileData.byteLength / 1024).toFixed(2)} KB`;
          downloadOutputBtn.style.display = 'inline-block'; downloadOutputBtn.textContent = '💾 下载加密文件';
          setOps('✅ 完成');
          showStatus('✅ 文件加密成功', 'success');
        }
      } catch (e) { showStatus('❌ 加密失败: ' + e.message, 'error'); setOps('失败'); }
    });

    decryptBtn.addEventListener('click', async () => {
      hideStatus(); setOps(''); downloadOutputBtn.style.display = 'none'; lastDecFileData = null;
      try {
        const params = getCurrentParams();
        if (currentMode === 'text') {
          const cipherText = plaintextInput.value.trim();
          if (!cipherText) { showStatus('⚠️ 请输入密文', 'warning'); return; }
          setOps('解密中…');
          let cipherBuf;
          const algo = getAlgoDef(currentAlgoId);
          if (algo.category === 'classic' || algo.category === 'encoding' || algo.id === 'morse') {
            cipherBuf = strToBuf(cipherText);
          } else {
            try { cipherBuf = base64ToBuf(cipherText); } catch { cipherBuf = strToBuf(cipherText); }
          }
          const result = await processDecrypt(cipherBuf, currentAlgoId, params, true);
          outputText.value = typeof result === 'string' ? result : bufToStr(result);
          setOps('✅ 解密完成');
          showStatus('✅ 解密成功', 'success');
        } else {
          if (!fileInput.files.length) { showStatus('⚠️ 请选择文件', 'warning'); return; }
          const file = fileInput.files[0];
          setOps('读取文件…');
          const fileBuf = await file.arrayBuffer();
          setOps('解密中…');
          const result = await processDecrypt(fileBuf, currentAlgoId, params, false);
          lastDecFileData = result;
          lastDecFileName = file.name.endsWith('.enc') ? file.name.slice(0, -4) : file.name + '.dec';
          outputText.value = `✅ 文件解密完成！输出大小：${(result.byteLength / 1024).toFixed(2)} KB`;
          downloadOutputBtn.style.display = 'inline-block'; downloadOutputBtn.textContent = '💾 下载解密文件';
          setOps('✅ 完成');
          showStatus('✅ 文件解密成功', 'success');
        }
      } catch (e) { showStatus('❌ 解密失败: ' + e.message, 'error'); setOps('失败'); }
    });

    downloadOutputBtn.addEventListener('click', () => {
      let data, name;
      if (lastEncFileData) { data = lastEncFileData; name = lastEncFileName; }
      else if (lastDecFileData) { data = lastDecFileData; name = lastDecFileName; }
      else { showStatus('⚠️ 没有可下载文件', 'warning'); return; }
      const blob = new Blob([data], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      showStatus('💾 下载开始', 'success');
    });

    clearAllBtn.addEventListener('click', () => {
      plaintextInput.value = ''; outputText.value = ''; fileInput.value = ''; fileInfo.textContent = '未选择文件';
      downloadOutputBtn.style.display = 'none'; lastEncFileData = lastDecFileData = null; outputInfo.textContent = '';
      hideStatus(); setOps('');
      showStatus('🗑️ 已清空所有输入和输出', 'info');
    });

    copyOutputBtn.addEventListener('click', async () => {
      const val = outputText.value;
      if (!val) { showStatus('⚠️ 无可复制内容', 'warning'); return; }
      try { await navigator.clipboard.writeText(val); showStatus('📋 已复制', 'success'); } catch { outputText.select(); document.execCommand('copy'); showStatus('📋 已复制', 'success'); }
    });

    tabBtns.forEach(b => b.addEventListener('click', () => {
      tabBtns.forEach(btn => btn.classList.remove('active-tab')); b.classList.add('active-tab');
      currentMode = b.dataset.tab;
      textInputArea.style.display = currentMode === 'text' ? 'block' : 'none';
      fileInputArea.style.display = currentMode === 'file' ? 'block' : 'none';
    }));
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) { const f = fileInput.files[0]; fileInfo.textContent = `📄 ${f.name} (${(f.size / 1024).toFixed(1)} KB)`; }
      else fileInfo.textContent = '未选择文件';
    });

    buildAlgoButtons();
    selectAlgo('aes256gcm');
  })();
</script>
</body>
</html>
