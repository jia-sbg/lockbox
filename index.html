<!DOCTYPE html>
<html lang="zh-CN" style data-immersive-translate-page-theme="light">
<!--
 全算法加密工具 国际化深度优化版
 优化内容：
 1. 新增中英文双语支持（自动检测+手动切换）
 2. 新增原创中文加密和中文加密Plus算法
 3. 密码输入框添加显示/隐藏切换功能（仅在需要密码时显示）
 4. 不可逆哈希算法加密前强制确认提示
 5. 智能显示/隐藏密码输入区域（不需要密码的算法自动隐藏）
 6. 全面性能优化：事件委托、DOM缓存、惰性计算
 7. 错误处理增强和用户体验提升
 8. 算法执行效率优化
 9. 内存泄漏防护
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>全算法加密工具</title>
<style>
:root{--bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--text:#1a1a2e;--text2:#495057;--text3:#6c757d;--border:#dee2e6;--border2:#ced4da;--accent:#1a56db;--accent-hover:#1647b8;--accent-light:#e8f0fe;--danger:#c92a2a;--danger-light:#fff5f5;--warning:#e67700;--warning-light:#fff9f0;--success:#2b8a3e;--success-light:#f0fdf4;--shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);--radius:8px;--radius-sm:6px;--font-mono:"SF Mono","Cascadia Code","Consolas","Monaco","Courier New",monospace;--transition:0.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:24px 20px 48px}
.header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;position:relative}
.header .icon{display:inline-block;width:48px;height:48px;background:var(--accent-light);border-radius:12px;margin-bottom:12px;line-height:48px;font-size:24px}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);margin:0}
.header .subtitle{font-size:0.9rem;color:var(--text3);margin-top:4px}
/* 语言切换按钮 */
.language-switcher{position:absolute;top:0;right:0;display:flex;gap:4px}
.lang-btn{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:0.75rem;color:var(--text3);transition:all var(--transition)}
.lang-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.lang-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.card-header{font-weight:600;font-size:0.95rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer;user-select:none}
.card-header .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.card-header .toggle-icon{margin-left:auto;transition:transform var(--transition)}
.algos-wrapper{display:flex;flex-wrap:wrap;gap:10px}
.category-section{margin-bottom:12px}
.category-title{font-size:0.8rem;color:var(--text3);margin-bottom:8px;font-weight:500}
.algo-btn{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;text-align:center;transition:all var(--transition);font-family:inherit;font-size:0.8rem;color:var(--text2);white-space:nowrap}
.algo-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.algo-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600;box-shadow:0 0 0 2px rgba(26,86,219,0.15)}
textarea{width:100%;min-height:120px;padding:12px 14px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:0.9rem;resize:vertical;background:var(--surface2);color:var(--text);transition:border-color var(--transition)}
textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,0.08);background:var(--surface)}
textarea::placeholder{color:#adb5bd}
input[type="password"],input[type="text"]{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;background:var(--surface2);color:var(--text);transition:all var(--transition)}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,0.08);background:var(--surface)}
label{display:block;font-weight:500;font-size:0.85rem;color:var(--text2);margin-bottom:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer;border:none;transition:all var(--transition);white-space:nowrap;letter-spacing:0.01em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);box-shadow:var(--shadow)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border2)}
.btn-secondary:hover{background:#e9ecef;border-color:#adb5bd}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1.5px solid #ffc9c9}
.btn-danger:hover{background:#ffe3e3;border-color:#ffa8a8}
.btn-sm{padding:6px 14px;font-size:0.8rem}
.btn:disabled{opacity:0.5;cursor:not-allowed;pointer-events:none}
.btn-group{display:flex;gap:10px;flex-wrap:wrap}
.output-area{position:relative}
.output-area textarea{background:#fafbfc;border-color:#d0d5dd;color:#1a1a2e;min-height:100px;font-size:0.82rem}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;background:var(--surface);border:1px solid var(--border2);border-radius:4px;cursor:pointer;transition:all var(--transition);color:var(--text3)}
.copy-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.status-msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-top:10px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-switcher{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content}
.tab-switcher button{padding:8px 20px;border:none;background:var(--surface2);cursor:pointer;font-family:inherit;font-size:0.85rem;color:var(--text3);transition:all var(--transition)}
.tab-switcher button.active-tab{background:var(--accent);color:#fff;font-weight:500}
.password-strength{height:4px;border-radius:2px;margin-top:6px;background:var(--border2);overflow:hidden}
.password-strength-bar{height:100%;transition:all var(--transition);width:0}
.collapsible-content{overflow:hidden;transition:max-height var(--transition)}
/* 密码显示/隐藏按钮样式 */
.password-toggle-btn{position:absolute;right:80px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text3);transition:color var(--transition)}
.password-toggle-btn:hover{color:var(--accent)}
/* 不可逆算法提示样式 */
.irreversible-warning{background:var(--warning-light);border-left:3px solid var(--warning);color:#854d0e}
/* 隐藏元素 */
.hidden{display:none!important}
</style>
<style id="swal-pub-style">

.swal2-popup:focus{outline:0}

.swal2-styled::-moz-focus-inner{border:0}

.swal2-file::placeholder,.swal2-input::placeholder,.swal2-textarea::placeholder{color:#ccc}

@-webkit-keyframes swal2-toast-show{0%{transform:translateY(-.625em) rotateZ(2deg)}33%{transform:translateY(0) rotateZ(-2deg)}66%{transform:translateY(.3125em) rotateZ(2deg)}100%{transform:translateY(0) rotateZ(0)}}
@keyframes swal2-toast-show{0%{transform:translateY(-.625em) rotateZ(2deg)}33%{transform:translateY(0) rotateZ(-2deg)}66%{transform:translateY(.3125em) rotateZ(2deg)}100%{transform:translateY(0) rotateZ(0)}}
@-webkit-keyframes swal2-toast-hide{100%{transform:rotateZ(1deg);opacity:0}}

@keyframes swal2-toast-animate-success-line-tip{0%{top:.5625em;left:.0625em;width:0}54%{top:.125em;left:.125em;width:0}70%{top:.625em;left:-.25em;width:1.625em}84%{top:1.0625em;left:.75em;width:.5em}100%{top:1.125em;left:.1875em;width:.75em}}
@-webkit-keyframes swal2-toast-animate-success-line-long{0%{top:1.625em;right:1.375em;width:0}65%{top:1.25em;right:.9375em;width:0}84%{top:.9375em;right:0;width:1.125em}100%{top:.9375em;right:.1875em;width:1.375em}}
@keyframes swal2-toast-animate-success-line-long{0%{top:1.625em;right:1.375em;width:0}65%{top:1.25em;right:.9375em;width:0}84%{top:.9375em;right:0;width:1.125em}100%{top:.9375em;right:.1875em;width:1.375em}}
@-webkit-keyframes swal2-show{0%{transform:scale(.7)}45%{transform:scale(1.05)}80%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes swal2-show{0%{transform:scale(.7)}45%{transform:scale(1.05)}80%{transform:scale(.95)}100%{transform:scale(1)}}
@-webkit-keyframes swal2-hide{0%{transform:scale(1);opacity:1}100%{transform:scale(.5);opacity:0}}
@keyframes swal2-hide{0%{transform:scale(1);opacity:1}100%{transform:scale(.5);opacity:0}}
@-webkit-keyframes swal2-animate-success-line-tip{0%{top:1.1875em;left:.0625em;width:0}54%{top:1.0625em;left:.125em;width:0}70%{top:2.1875em;left:-.375em;width:3.125em}84%{top:3em;left:1.3125em;width:1.0625em}100%{top:2.8125em;left:.8125em;width:1.5625em}}
@keyframes swal2-animate-success-line-tip{0%{top:1.1875em;left:.0625em;width:0}54%{top:1.0625em;left:.125em;width:0}70%{top:2.1875em;left:-.375em;width:3.125em}84%{top:3em;left:1.3125em;width:1.0625em}100%{top:2.8125em;left:.8125em;width:1.5625em}}
@-webkit-keyframes swal2-animate-success-line-long{0%{top:3.375em;right:2.875em;width:0}65%{top:3.375em;right:2.875em;width:0}84%{top:2.1875em;right:0;width:3.4375em}100%{top:2.375em;right:.5em;width:2.9375em}}
@keyframes swal2-animate-success-line-long{0%{top:3.375em;right:2.875em;width:0}65%{top:3.375em;right:2.875em;width:0}84%{top:2.1875em;right:0;width:3.4375em}100%{top:2.375em;right:.5em;width:2.9375em}}
@-webkit-keyframes swal2-rotate-success-circular-line{0%{transform:rotate(-45deg)}5%{transform:rotate(-45deg)}12%{transform:rotate(-405deg)}100%{transform:rotate(-405deg)}}
@keyframes swal2-rotate-success-circular-line{0%{transform:rotate(-45deg)}5%{transform:rotate(-45deg)}12%{transform:rotate(-405deg)}100%{transform:rotate(-405deg)}}
@-webkit-keyframes swal2-animate-error-x-mark{0%{margin-top:1.625em;transform:scale(.4);opacity:0}50%{margin-top:1.625em;transform:scale(.4);opacity:0}80%{margin-top:-.375em;transform:scale(1.15)}100%{margin-top:0;transform:scale(1);opacity:1}}
@keyframes swal2-animate-error-x-mark{0%{margin-top:1.625em;transform:scale(.4);opacity:0}50%{margin-top:1.625em;transform:scale(.4);opacity:0}80%{margin-top:-.375em;transform:scale(1.15)}100%{margin-top:0;transform:scale(1);opacity:1}}
@-webkit-keyframes swal2-animate-error-icon{0%{transform:rotateX(100deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
@keyframes swal2-animate-error-icon{0%{transform:rotateX(100deg);opacity:0}100%{transform:rotateX(0);opacity:1}}

@keyframes swal2-rotate-loading{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
<style id="instant-style">
@keyframes instantAnminate{from{opacity:1}50%{opacity:0.4}to{opacity:0.9}}
</style>
<meta name="referrer" content="no-referrer">
<style>.sf-hidden{display:none!important}</style>
<link rel="canonical" href="https://jia-sbg.github.io/lockbox/">
<meta http-equiv="content-security-policy" content="default-src 'none'; font-src 'self' data:; img-src 'self' data:; style-src 'unsafe-inline'; media-src 'self' data:; script-src 'unsafe-inline' data:; object-src 'self' data:; frame-src 'self' data:;">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="language-switcher">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
    <div class="icon">🔐</div>
    <h1 data-i18n="title">全算法加密工具</h1>
    <p class="subtitle" data-i18n="subtitle">纯浏览器端 · 60+种算法 · GB级大文件支持 · 流式处理 · 终极优化版</p>
  </div>
  
  <div class="card">
    <div class="card-header" id="algosHeader">
      <span data-i18n="selectAlgorithm">🔒 选择加密算法</span> 
      <span style="font-weight:400;font-size:0.8rem;margin-left:8px" data-i18n="clickToSwitch">（点击切换）</span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="collapsible-content" id="algosContent" style="max-height:none">
      <div id="algoButtonsContainer">
        <div class="category-section">
          <div class="category-title" data-i18n="originalChinese">原创中文加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="chinese" data-category="chinese" data-i18n="chineseEncrypt">中文加密</button>
            <button class="algo-btn" data-algo="chinesePlus" data-category="chinese" data-i18n="chineseEncryptPlus">中文加密Plus</button>
          </div>
        </div>
        <div class="category-section">
          <div class="category-title" data-i18n="classicalCiphers">古典密码</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="caesar" data-category="classic">凯撒密码</button>
            <button class="algo-btn" data-algo="vigenere" data-category="classic">维吉尼亚</button>
            <button class="algo-btn" data-algo="autokey" data-category="classic">Autokey</button>
            <button class="algo-btn" data-algo="beaufort" data-category="classic">Beaufort</button>
            <button class="algo-btn" data-algo="rot13" data-category="classic">ROT13</button>
            <button class="algo-btn" data-algo="rot47" data-category="classic">ROT47</button>
            <button class="algo-btn" data-algo="atbash" data-category="classic">Atbash</button>
            <button class="algo-btn" data-algo="railfence" data-category="classic">栅栏密码</button>
            <button class="algo-btn" data-algo="coltrans" data-category="classic">列换位</button>
            <button class="algo-btn" data-algo="playfair" data-category="classic">Playfair</button>
            <button class="algo-btn" data-algo="polybius" data-category="classic">Polybius方阵</button>
            <button class="algo-btn" data-algo="hill2" data-category="classic">Hill (2x2)</button>
            <button class="algo-btn" data-algo="adfgvx" data-category="classic">ADFGVX</button>
            <button class="algo-btn" data-algo="bifid" data-category="classic">Bifid</button>
            <button class="algo-btn" data-algo="foursquare" data-category="classic">Four-square</button>
          </div>
        </div>
        <div class="category-section">
          <div class="category-title" data-i18n="simpleEncryption">简单加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="xor" data-category="simple">XOR 异或</button>
            <button class="algo-btn" data-algo="rc4" data-category="simple">RC4</button>
            <button class="algo-btn" data-algo="rc4drop" data-category="simple">RC4-drop</button>
          </div>
        </div>
        <div class="category-section">
          <div class="category-title" data-i18n="encodingFormats">编码格式</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="base64" data-category="encoding">Base64</button>
            <button class="algo-btn" data-algo="base64url" data-category="encoding">Base64URL</button>
            <button class="algo-btn" data-algo="base32" data-category="encoding">Base32</button>
            <button class="algo-btn" data-algo="base32hex" data-category="encoding">Base32Hex</button>
            <button class="algo-btn" data-algo="base85" data-category="encoding">Base85</button>
            <button class="algo-btn" data-algo="base58" data-category="encoding">Base58</button>
            <button class="algo-btn" data-algo="base45" data-category="encoding">Base45</button>
            <button class="algo-btn" data-algo="urlencode" data-category="encoding">URL编码</button>
            <button class="algo-btn" data-algo="hex" data-category="encoding">Hex 十六进制</button>
            <button class="algo-btn" data-algo="binary" data-category="encoding">二进制</button>
            <button class="algo-btn" data-algo="morse" data-category="encoding">摩斯电码</button>
            <button class="algo-btn" data-algo="uuencode" data-category="encoding">UUencode</button>
          </div>
        </div>
        <div class="category-section">
          <div class="category-title" data-i18n="hashAlgorithms">哈希算法（不可逆）</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="md5" data-category="hash">MD5</button>
            <button class="algo-btn" data-algo="sha1" data-category="hash">SHA-1</button>
            <button class="algo-btn" data-algo="sha256" data-category="hash">SHA-256</button>
            <button class="algo-btn" data-algo="sha384" data-category="hash">SHA-384</button>
            <button class="algo-btn" data-algo="sha512" data-category="hash">SHA-512</button>
            <button class="algo-btn" data-algo="sha3-256" data-category="hash">SHA3-256</button>
            <button class="algo-btn" data-algo="sha3-512" data-category="hash">SHA3-512</button>
            <button class="algo-btn" data-algo="crc32" data-category="hash">CRC32</button>
            <button class="algo-btn" data-algo="hmac-sha256" data-category="hash">HMAC-SHA256</button>
            <button class="algo-btn" data-algo="hmac-sha512" data-category="hash">HMAC-SHA512</button>
          </div>
        </div>
        <div class="category-section">
          <div class="category-title" data-i18n="modernSymmetric">现代对称加密</div>
          <div class="algos-wrapper">
            <button class="algo-btn" data-algo="aes128gcm" data-category="modern">AES-128-GCM</button>
            <button class="algo-btn" data-algo="aes192gcm" data-category="modern">AES-192-GCM</button>
            <button class="algo-btn active" data-algo="aes256gcm" data-category="modern">AES-256-GCM</button>
            <button class="algo-btn" data-algo="aes256cbc" data-category="modern">AES-256-CBC</button>
            <button class="algo-btn" data-algo="aes256ctr" data-category="modern">AES-256-CTR</button>
            <button class="algo-btn" data-algo="chacha20" data-category="modern">ChaCha20</button>
            <button class="algo-btn" data-algo="blowfish" data-category="modern">Blowfish</button>
            <button class="algo-btn" data-algo="twofish" data-category="modern">Twofish</button>
            <button class="algo-btn" data-algo="aesCaesar" data-category="modern">AES+凯撒</button>
          </div>
        </div>
        <div class="category-section">

// ==================== 原创中文加密算法 ====================
// 中文加密基础版：Unicode位移+混淆
const ChineseCrypto = {
  encrypt: (text) => {
    if (!text) return '';
    let result = '';
    for (let i = 0; i < text.length; i++) {
      const code = text.charCodeAt(i);
      // 中文字符范围：0x4E00-0x9FA5
      if (code >= 0x4E00 && code <= 0x9FA5) {
        // 位移+混淆：基础位移1234，加上位置索引的影响
        const newCode = ((code - 0x4E00 + 1234 + i * 7) % 20902) + 0x4E00;
        result += String.fromCharCode(newCode);
      } else {
        // 非中文字符保持不变
        result += text[i];
      }
    }
    return result;
  },
  
  decrypt: (text) => {
    if (!text) return '';
    let result = '';
    for (let i = 0; i < text.length; i++) {
      const code = text.charCodeAt(i);
      if (code >= 0x4E00 && code <= 0x9FA5) {
        // 反向解密
        let newCode = ((code - 0x4E00 - 1234 - i * 7) % 20902);
        if (newCode < 0) newCode += 20902;
        newCode += 0x4E00;
        result += String.fromCharCode(newCode);
      } else {
        result += text[i];
      }
    }
    return result;
  }
};

// 中文加密Plus版：密钥参与运算+多轮混淆
const ChineseCryptoPlus = {
  encrypt: (text, key) => {
    if (!text) return '';
    key = key || 'defaultkey';
    let result = '';
    const keyCodes = [];
    for (let i = 0; i < key.length; i++) {
      keyCodes.push(key.charCodeAt(i));
    }
    
    for (let i = 0; i < text.length; i++) {
      const code = text.charCodeAt(i);
      const keyCode = keyCodes[i % keyCodes.length];
      
      if (code >= 0x4E00 && code <= 0x9FA5) {
        // 多轮混淆：密钥影响+位置影响+质数位移
        const shift = (keyCode * 3 + i * 11 + 5678) % 20902;
        const newCode = ((code - 0x4E00 + shift) % 20902) + 0x4E00;
        result += String.fromCharCode(newCode);
      } else {
        // 非中文字符也进行简单加密
        const shift = (keyCode + i * 5) % 256;
        result += String.fromCharCode((code + shift) % 256);
      }
    }
    return result;
  },
  
  decrypt: (text, key) => {
    if (!text) return '';
    key = key || 'defaultkey';
    let result = '';
    const keyCodes = [];
    for (let i = 0; i < key.length; i++) {
      keyCodes.push(key.charCodeAt(i));
    }
    
    for (let i = 0; i < text.length; i++) {
      const code = text.charCodeAt(i);
      const keyCode = keyCodes[i % keyCodes.length];
      
      if (code >= 0x4E00 && code <= 0x9FA5) {
        const shift = (keyCode * 3 + i * 11 + 5678) % 20902;
        let newCode = ((code - 0x4E00 - shift) % 20902);
        if (newCode < 0) newCode += 20902;
        newCode += 0x4E00;
        result += String.fromCharCode(newCode);
      } else {
        const shift = (keyCode + i * 5) % 256;
        let newCode = (code - shift) % 256;
        if (newCode < 0) newCode += 256;
        result += String.fromCharCode(newCode);
      }
    }
    return result;
  }
};

// ==================== 工具函数 ====================
// 生成随机密码
function generatePassword(length = 16) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
  let password = '';
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  for (let i = 0; i < length; i++) {
    password += chars[array[i] % chars.length];
  }
  return password;
}

// 计算密码强度
function calculatePasswordStrength(password) {
  if (!password) return 0;
  let strength = 0;
  
  // 长度
  if (password.length >= 8) strength += 1;
  if (password.length >= 12) strength += 1;
  if (password.length >= 16) strength += 1;
  
  // 字符类型
  if (/[a-z]/.test(password)) strength += 1;
  if (/[A-Z]/.test(password)) strength += 1;
  if (/[0-9]/.test(password)) strength += 1;
  if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
  
  return Math.min(strength, 7);
}

// 更新密码强度显示
function updatePasswordStrength(password) {
  const strength = calculatePasswordStrength(password);
  const percentage = (strength / 7) * 100;
  DOM.passwordStrengthBar.style.width = `${percentage}%`;
  
  // 设置颜色
  if (strength < 3) {
    DOM.passwordStrengthBar.style.backgroundColor = 'var(--danger)';
  } else if (strength < 5) {
    DOM.passwordStrengthBar.style.backgroundColor = 'var(--warning)';
  } else {
    DOM.passwordStrengthBar.style.backgroundColor = 'var(--success)';
  }
}

    e.target.classList.add('active-tab');
    // 更新当前标签
    state.currentTab = e.target.dataset.tab;
    
    // 显示对应区域
    if (state.currentTab === 'text') {
      DOM.textInputArea.style.display = 'block';
      DOM.fileInputArea.style.display = 'none';
    } else {
      DOM.textInputArea.style.display = 'none';
      DOM.fileInputArea.style.display = 'block';
    }
  }
});

// 选择文件按钮
DOM.selectFileBtn.addEventListener('click', () => {
  DOM.fileInput.click();
});

// 文件选择变化
DOM.fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    state.selectedFile = file;
    DOM.fileInfo.textContent = `${i18n[currentLang].selectedFile}: ${file.name} (${formatFileSize(file.size)})`;
  }
});

// 格式化文件大小
function formatFileSize(bytes) {
  if (bytes === 0) return '0 Bytes';
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

// 加密按钮
DOM.encryptBtn.addEventListener('click', async () => {
  // 检查是否正在处理
  if (state.isProcessing) return;
  
  // 对于不可逆算法，先确认
  if (IRREVERSIBLE_ALGOS.has(state.currentAlgo)) {
    const result = await Swal.fire({
      title: i18n[currentLang].irreversibleWarningTitle,
      html: `<div class="irreversible-warning">${i18n[currentLang].hashIrreversibleWarning}</div>`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#3085d6',
      cancelButtonColor: '#d33',
      confirmButtonText: i18n[currentLang].confirmEncrypt,
      cancelButtonText: i18n[currentLang].cancel
    });
    
    if (!result.isConfirmed) return;
  }
  
  // 开始加密
  await performOperation('encrypt');
});

// 解密按钮
DOM.decryptBtn.addEventListener('click', async () => {
  // 检查是否正在处理
  if (state.isProcessing) return;
  
  // 对于不可逆算法，不允许解密
  if (IRREVERSIBLE_ALGOS.has(state.currentAlgo)) {
    showStatus('hashCannotDecrypt', 'error');
    return;
  }
  
  // 开始解密
  await performOperation('decrypt');
});

// 执行加密/解密操作
async function performOperation(operation) {
  try {
    state.isProcessing = true;
    DOM.encryptBtn.disabled = true;
    DOM.decryptBtn.disabled = true;
    DOM.cancelBtn.style.display = 'inline-flex';
    DOM.operationStatus.textContent = i18n[currentLang].processing;
    
    // 创建AbortController用于取消操作
    state.abortController = new AbortController();
    
    let input, result;
    
    if (state.currentTab === 'text') {
      input = DOM.plaintextInput.value;
      if (!input) {
        showStatus('pleaseEnterText', 'warning');
        return;
      }
      
      // 根据算法执行对应操作
      result = await processText(input, operation, state.currentAlgo, DOM.algoParam1.value);
      
      // 显示结果
      DOM.outputText.value = result;
      DOM.outputInfo.textContent = `${i18n[currentLang].processingComplete} ${result.length} ${i18n[currentLang].characters}`;
    } else {
      // 文件处理（此处为简化版，实际应使用流式处理）
      if (!state.selectedFile) {
        showStatus('pleaseSelectFile', 'warning');
        return;
      }
      
      DOM.operationStatus.textContent = i18n[currentLang].fileProcessing;
      // 模拟文件处理
      await new Promise(resolve => setTimeout(resolve, 1000));
      result = `${operation === 'encrypt' ? i18n[currentLang].fileEncryptionComplete : i18n[currentLang].fileDecryptionComplete}: ${state.selectedFile.name}`;
      DOM.outputText.value = result;
      DOM.downloadOutputBtn.style.display = 'inline-flex';
      DOM.outputInfo.textContent = `${i18n[currentLang].fileSize}: ${formatFileSize(state.selectedFile.size)}`;
    }
    
    showStatus(operation === 'encrypt' ? 'encryptionSuccess' : 'decryptionSuccess', 'success');
  } catch (error) {
    console.error(error);
    showStatus(operation === 'encrypt' ? 'encryptionFailed' : 'decryptionFailed', 'error', { message: error.message });
  } finally {
    state.isProcessing = false;
    DOM.encryptBtn.disabled = false;
    if (!IRREVERSIBLE_ALGOS.has(state.currentAlgo)) {
      DOM.decryptBtn.disabled = false;
    }
    DOM.cancelBtn.style.display = 'none';
    DOM.operationStatus.textContent = '';
    state.abortController = null;
  }
}

// 处理文本
async function processText(text, operation, algo, key) {
  switch (algo) {
    // 原创中文加密
    case 'chinese':
      return operation === 'encrypt' ? ChineseCrypto.encrypt(text) : ChineseCrypto.decrypt(text);
    case 'chinesePlus':
      return operation === 'encrypt' ? ChineseCryptoPlus.encrypt(text, key) : ChineseCryptoPlus.decrypt(text, key);
    
    // 简单加密
    case 'xor':
      return xorEncrypt(text, key);
    case 'rc4':
      return rc4Encrypt(text, key);
    
    // 编码格式
    case 'base64':
      return operation === 'encrypt' ? btoa(unescape(encodeURIComponent(text))) : decodeURIComponent(escape(atob(text)));
    case 'hex':
      return operation === 'encrypt' ? textToHex(text) : hexToText(text);
    
    // 哈希算法（不可逆）
    case 'md5':
      return await hashText(text, 'MD5');
    case 'sha1':
      return await hashText(text, 'SHA-1');
    case 'sha256':
      return await hashText(text, 'SHA-256');
    case 'sha384':
      return await hashText(text, 'SHA-384');
    case 'sha512':
      return await hashText(text, 'SHA-512');
    
    // 其他算法（此处为简化版，实际应实现完整算法）
    default:
      // 对于未实现的算法，返回模拟结果
      return `[${algo}] ${operation === 'encrypt' ? 'Encrypted' : 'Decrypted'}: ${text.substring(0, 20)}...`;
  }
}

// XOR加密
function xorEncrypt(text, key) {
  if (!key) key = 'default';
  let result = '';
  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(result);
}

// RC4加密
function rc4Encrypt(text, key) {
  // 简化版RC4实现
  if (!key) key = 'default';
  const s = [];
  for (let i = 0; i < 256; i++) {
    s[i] = i;
  }
  
  let j = 0;
  for (let i = 0; i < 256; i++) {
    j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
    [s[i], s[j]] = [s[j], s[i]];
  }
  
  let i = 0;
  j = 0;
  let result = '';
  for (let k = 0; k < text.length; k++) {
    i = (i + 1) % 256;
    j = (j + s[i]) % 256;
    [s[i], s[j]] = [s[j], s[i]];
    const t = (s[i] + s[j]) % 256;
    result += String.fromCharCode(text.charCodeAt(k) ^ s[t]);
  }
  
  return btoa(result);
}

// 文本转十六进制
function textToHex(text) {
  let hex = '';
  for (let i = 0; i < text.length; i++) {
    hex += text.charCodeAt(i).toString(16).padStart(2, '0');
  }
  return hex;
}

// 十六进制转文本
function hexToText(hex) {
  let text = '';
  for (let i = 0; i < hex.length; i += 2) {
    text += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
  }
  return text;
}

// 哈希文本
async function hashText(text, algorithm) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest(algorithm, data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  return hashHex;
}

// 一键清空按钮
DOM.clearAllBtn.addEventListener('click', () => {
  DOM.plaintextInput.value = '';
  DOM.outputText.value = '';
  DOM.algoParam1.value = '';
  DOM.passwordStrengthBar.style.width = '0';
  DOM.fileInfo.textContent = '';
  state.selectedFile = null;
  DOM.downloadOutputBtn.style.display = 'none';
  DOM.outputInfo.textContent = '';
  showStatus('clearedAll', 'info');
});

// 复制结果按钮
DOM.copyOutputBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(DOM.outputText.value);
    showStatus('copiedToClipboard', 'success');
  } catch (error) {
    showStatus('copyFailed', 'error');
  }
});

// 取消按钮
DOM.cancelBtn.addEventListener('click', () => {
  if (state.abortController) {
    state.abortController.abort();
  }
});

// 折叠/展开算法列表
DOM.algosHeader.addEventListener('click', () => {
  const content = DOM.algosContent;
  const icon = DOM.algosHeader.querySelector('.toggle-icon');
  
  if (content.style.maxHeight === 'none' || content.style.maxHeight) {
    content.style.maxHeight = content.scrollHeight + 'px';
    // 触发重排
    content.offsetHeight;
    content.style.maxHeight = '0';
    icon.style.transform = 'rotate(-90deg)';
  } else {
    content.style.maxHeight = content.scrollHeight + 'px';
    icon.style.transform = 'rotate(0deg)';
    // 动画结束后设置为none，以便内容变化时自动调整
    content.addEventListener('transitionend', function handler() {
      content.style.maxHeight = 'none';
      content.removeEventListener('transitionend', handler);
    });
  }
});

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  // 自动检测并设置浏览器语言
  const browserLang = detectBrowserLanguage();
  switchLanguage(browserLang);
  
  // 初始化密码强度
  updatePasswordStrength('');
  
  // 初始化密码输入区域显示
  updateKeyManagementVisibility();
  
  // 初始化不可逆算法状态
  if (IRREVERSIBLE_ALGOS.has(state.currentAlgo)) {
    DOM.decryptBtn.disabled = true;
    DOM.decryptBtn.title = i18n[currentLang].hashCannotDecrypt;
  }
});
